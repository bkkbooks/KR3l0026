body:
  text: 南部新書卷二宋錢易撰貞元十二年盧邁喪弟請出城臨近年宰相多拘守而邁有此行時論美之裴延齡綴輯裴駰所注史記之闕自號小裴楊氏於靜恭一房尤盛汝士虞卿漢公魯士是也虞卿生知退知退生堪堪生承休承休生巖巖生郁郁生覃覃太平興國八年成名近為諌議大夫知廣州卒堪為翰林承旨學士隨僖皇幸蜀真在中和院承休自刑部員外郎使浙右值多難水陸相阻遂不歸巖侍行十六矣我曽祖武肅辟之幕下先人承襲巖已為丞相及叔文西上巖以圖籍入覲卒於秀州年八十餘今刑部郎中直集賢院侃亦巖之第三子郾孫也蠙之子司封員外郎蛻即巖第三子郾之子郾入京為員外郎分司判西臺卒侃端拱二年成名蛻淳化三年登科修行即四李也發蝦收巖履道即憑氷凝也新昌即於陵也後涉入相即修行房也制下之日母氏垂泣不恱以收故也蕭氏登三事者多於他族首於瑀嵩華俯倣置遘頎次之貞元十二年天子降誕日詔儒官與緇黃講論初若矛盾相向後類江海同歸三殿談經自此始也韓臯自京尹貶撫州司馬召為左執金吾奏於延英面授京尹便令視事時尚未有制金鑾殿始立於金鑾坡至朱梁始改為金鑾殿焉開元中筆匠者名鐵頭能瑩竹如玉莫傳其法也婦人之貴無出於苗夫人晉卿之女張嘉貞之新婦延賞之妻𢎞靖之母韋臯之外姑王徽為相只一日中和五年二月除昭義節度徽上表乞免詞曰六年內署雖叨捧日之榮一日台司未展致君之懇後蕭置拜相及降麻日薨陸希聲登庸未上棄世今徽之曽孫平叔見任禮博希聲之子賔于終於殿省凡中書有軍國政事則中書舍人各執所見雜署其名謂之五花判事其舍人中選一人明練政事者專典機密謂之解事舍人開元中將軍來清有神劍後為瓜州牧李廣琛所得哥舒翰知而求之廣琛不與因贈詩曰刻舟尋已化彈鋏未酬恩永徽元年五月吐火羅國遣使獻大鳥髙七尺其足如駝鼓翅而行日三百里能啖銅鐵其國呼為駝鳥貞觀十三年始改治書御史為御史中丞其年亦改諸州治中為司馬禮部郎為奉禮郎儀鳳二年長安光宅坊掘得石函函之內有佛舍利萬餘粒貞元十二年上宴宰相於麟德殿之東亭令施屏風於坐位之後畫漢魏以下名臣并列善言美事永徽五年吐蕃獻大佛廬髙五丈廣二十步祖詠試雪霽望終南詩限六十字成四句納主司詰之對曰意盡咸通九年正月始以李贊皇孫延古起家為集賢校理諸名族重京官而輕外任故楊汝士建節後詩云拋却弓刀上砌臺上方樓殿窣雲開山僧見我衣裳窄知道新從戰地來又云如今老大騎官馬羞向關西道姓楊貞元十四年初令金吾不要奏朝官相過從張建封奏也舊皆傳呼貞觀十年馬周奏置街鼓以代傳呼自此而罷永徽五年八月蔣孝璋除尚藥奉御員外置同正員員外官始自此貞元後每歲二月八日總章寺佛牙開至十五日畢四月八日崇聖寺佛牙開至十五日畢此牙即那吒太子上宣律師者進士春闈宴曲江亭在五六月間一春宴會有何士參者都主其事多有欠其宴罰錢者須待納足始肯置宴蓋未過此宴不得出京人戲謂何士參索債宴士參卒其子漢儒繼其父業南院驅使官鄭鎔者知名天下後亦官至宣州判司故宛陵王公凝判鹺充職得朝散階如鄭鎔與何士參及堂門官張良佐皆應三數百年在於人口李林甫開元初為中允時源乾曜為侍中是中表之戚託其子求司門郎中乾曜曰郎官須有素行才望髙者哥奴豈是郎官耶數日除諭德哥奴林甫小字明皇末年在華清宫值正月望欲夜遊陳玄禮奏曰宫外即是曠野須有預備若欲夜遊願歸城闕大厯中禁屠殺而郭子儀𨽻人殺羊裴諝尹京具奏之或言郭公有社稷功豈不為蓋之裴笑曰非而所解郭公權太盛上新即位必謂黨附者衆吾今發其細過以明其不弄權用安大臣耳人皆是之諝五世為河南尹坐未嘗當正位貞元十二年始置掖庭局令吏部有四拗冬納文書之始却謂之選門閉四月秋省事畢反謂之選門開選人各在令史門前謂之某家百姓南場判後狀却黏判前韋臯見辱於張延賞崔圓受薄於李彥允皆丈人子聓後韋為張西川交代崔殺李殊死趙光逢有時稱謂之玉界尺鄭滑盧𢎞正尚書題栁泉驛云余自歙州刺史除度支郎中八月十七日午時過永濟渡後自度支郎中除鄭州刺史亦以八月十七日午時過永濟渡從吏部郎中除楚州刺史以六月十四日宿湖城縣今年從楚州刺史除給事中計程亦合是六月十四日湖城縣宿事雖偶然亦冥數也韓偓即瞻之子也兄儀瞻與李義山同年禁中謂之韓冬郎是也故題偓云七歲裁詩走馬成冬郎偓小名偓字致光王右丞善琵琶賈魏公善琴皆妙絶一時李邵除賀州人言不熟臺閣故著骰子選格貞元二年以右常侍于頔為左千牛衛上將軍少府監李忠誠為千牛衛上將軍司農卿姚明揚為右領軍大將軍右庶子裴諝為右千牛衛大將軍參用文武也韓滉鎮浙西統制一方頗著勤績晚途政甚苛慘亦可惜也咸通九年劉允章放榜後奏新進士春闈前擇日謁謝先師皆服青襟介幘有洙泗之風焉長安四月以後自堂厨至百司厨通謂之櫻笋厨公餗之盛與常日不同每歲寒食薦餳粥雞毬等又薦雷子車至清明尚食內園官小兒於殿前鑽火先得火者進上賜絹三匹碗一口都人並在延恩門看人出城灑掃車馬喧閙新進士則於月燈閣置打毬之宴或賜宰臣以下酴醿酒即重釀酒也貞元中蔡帥陳光竒於李希烈庭中得錢一文大小如開通之狀文曰天下太平自唐初來歷五院惟三人李商隱張延賞溫造五院謂監察殿中侍御史中丞大夫貞元十八年五月以祠部員外郎裴秦檢校兵部郎中兼中丞安南都護本管經略使殊拜也顧况志尚疏逸近於方外時宰招以好官况以詩答之云四海如今已太平相公何用喚狂生此身還似籠中鶴東望瀛洲呌一聲貞元初山人鄧思齊獻威靈仙草出商州能愈衆疾禁中試有效特令編付史館貞元十七年翰林待詔戴少平死十六日復生宋邧為補闕與同省候李崖州而笑語稍聞浹旬除河清令長安舉子自六月以後落第者不出京謂之過夏多借靜坊廟院及間宅居住作新文章謂之夏課亦有十人五人醵率酒饌請題目於知己朝達謂之私試七月後投獻新課并干諸州府拔解人為語曰槐花黃舉人忙郭幼明子儀之母弟無學術武藝但善飲酒好會賓客而已卒亦贈太子太傅孔巢父使田恱謂之曰不早歸國為一好賊爾恱曰為賊既曰好賊為臣當作功臣開元天寶間有內三司置於禁中內職有權要者掌之天下財穀著之簿間毫髮無隱韋貫之及第年建議曰今歲有司放榜春闈以前請以新及第為名至今不改韋肇初及第偶於慈恩寺塔下題名後進慕效之遂成故事令狐楚久為太常博士有詩云何日肩三署終年尾百僚梁祖欲以牙將張延範為太常卿諸相議之裴樞曰延範勳臣幸有方鎮節鉞之命何藉樂卿恐非梁王之旨乃持之不與裴終以此受禍歲除日太常卿領官屬樂吏并護僮侲子千人晚入內至夜於寢殿前進儺燃蠟炬燎沉檀熒煌如晝上與親王妃主以下觀之其夕賞賜甚多是日衣冠家子弟多覓侲子之衣著而竊看宫中頃有進士臧童者老矣偶為人牽率同入其間為樂吏所驅有時一跌不敢擡頭望視執㹈牛尾拂子鞠躬宛轉隨隊唱夜好千匝於廣庭之中及將旦得出不勝困劣扶舁而歸一病六十日而就試不得政事堂有後門蓋宰相時過舍人院咨訪政事以自廣也常衮塞之以示尊大凡內有公事商量即降宣付閣門開延英閣門翻宣申中書并榜正衙門如中書有公事敷奏即宰臣入榜子奏請開延英又一説延英殿即靈芝殿也謂之小延英苗晉卿居相以足疾上每於此待之宰相對小延英自此始也李揆秉政苗侍中薦元載揆不納謂晉卿曰龍章鳳姿之士不可見麞頭鼠目之人及載入相除揆試祕書監江淮養疾凡十餘年五方師子本領出在太常靖恭崔尚書邠為樂卿左軍并教坊曽移牒索此戲稱云備行從崔公判回牒不與閲儺日如方鎮大享屈諸司侍郎兩省官同看崔公時在色養之下自靖恭坊露冕從板輿入太常寺棚中百官皆取路回避不敢直衝時論榮之盧杞貌醜而藍色人皆鬼視之陳少遊除桂察許中人董秀歲供五萬米行改越察故事諸官兼大夫中丞但升在本官之上貞元中元涵為蘇州刺史兼御史大夫便判臺事父子知舉三家髙鍇子湘湜于邵子允躬崔郾子瑶惟崔氏相去只二十年吏部故事放長名榜舊語曰長名以前選人屬侍郎長名以後侍郎屬選人吏部常式舉選人家狀須云中形黃白色少有髭或武選人家狀云長形紫黑色多有髭西蕃諸國通唐使處置銅魚雄雌相各十二隻皆銘其國名第一至十二雄者留內雌者付本國如國使正月來賫第一魚餘月凖此閏月即賫本國而已校其雌雄合依常禮待之差謬即按至開元末鴻臚奏蕃國背叛銅魚多散失始令所司改鑄太和中上謂宰臣曰明經會義否宰臣曰明經只念經疏不會經義帝曰只念經疏何異鸚鵡能言貞元中裴肅為常州刺史以進奉為越察劉贊死於宣州判官嚴綬領軍進奏為刑部員外天下刺史進奉自裴肅始判官進奏自嚴綬始鄭雲逵由朱滔軍逃歸長安自盧龍掌記檢校祠部員外郎除諫議大夫徐浩越州人嶠之子三遷右拾遺並充麗正殿校理絳州碧落觀碑文乃髙祖子韓王元嘉四男為元妃所製陳惟玉書今不知者妄有怪説但背有碧落二字故傳為碧落碑白傅與贊皇不協白每有所寄文章李緘之一篋未嘗開劉三復或請之曰見詞翰則回吾心矣蕃中飛鳥使中國之驛騎也舊制起居院在中書省內貞元中太常奏每年大小中祠共七十七祭天寶中語云殷顔栁陸蕭李邵趙以其行義敦交也殷寅顔真卿栁芳陸據蕭穎士李華邵軫趙驒天后時太常丞李嗣真聞東夷三曲一遍援胡琴彈之無一聲遺忘平原有寃獄顔真卿為御史辨之天方旱獄決乃雨復有鄭延祚者母卒二十九年殯僧舍垣地真卿劾奏之兄弟皆不齒天下聳動舊制中書舍人分押六曹以平奏報貞元中盧杞為相請分之楊炎固以為不可貞元元年十一月京兆奏有人於長興坊得玉璽文曰天子信璽奘三藏至西域入維摩詰方丈及還將紀年月於壁染翰欲書約行數千百步終不及牆元和中李絳崔羣同掌密命韋貫之裴度知制誥李簡中丞並裴垍在翰林日所舉皆相次入輔太和中樂工尉遲璋左能囀喉為新聲京師屠沽效呼為拍彈朱敬則亳州永城人也孝行忠鯁舉世莫比門表闕臺者六所今古無之玄孫禹錫咸平二年學究登科見任虞部員外郎貞觀中紀國僧慧靜撰續英華詩苑行於代慧靜常言曰作之非難鑒之為貴吾所搜揀亦詩三百篇之次慧靜俗姓房有操識今復有詩編十卷與英華相似起自梁代迄於今朝以類相從多於慧靜所集而不題撰集人名氏南部新書卷二
