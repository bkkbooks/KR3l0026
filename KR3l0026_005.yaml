body:
  text: 南部新書卷五宋錢易撰天后朝道士杜義回心求度為僧敕許剃染配佛授記法名𤣥嶷敕賜三十夏臘以其乍入法流須居下位茍賜虛臘則頓為老成也賜夏臘起於此矣太和中祕書之書總五萬六千六卷神堯宴近臣果有蒲桃陳叔達捧而不食帝詢之對曰臣母患口乾求之不致帝曰卿有母遺乎涕泗闌干馬周臨終索陳事草一篋手自焚之曰管晏彰君之過求身後名吾不為也髙帝出獵見大官刲羊謂其無罪就死以死鹿代之沈既濟生傅師傅師生詢詢生丹丹生牢牢巢寇前為錢唐監使生藻後移刺鄱陽巢寇亂不知其終時藻與家人不隨之任藻後仕吳越錢氏為永嘉令藻生承諒為定海丞諒咸平三年進士及第今為都官員外郎知處州王師魯在孔戊幕中嘗言曰半臂亦無文房太尉家法不著張九齡嘗見安祿山曰亂天下者此人也諫殺之不聽紫石英廣管瀧州山中出紫石英其色淡紫真質瑩徹隨其大小皆五棱兩頭箭鏃煮水飲之暖而無毒比北中白石英其力倍矣瀧州又出石斛莖如金叉股亦藥中之上品蚺蛇膽雷羅州有養蛇戶每年五月五日即擔舁蚺蛇入府祇應取膽雞兔算國史譜紀之尚不明上下頭下下腳腳即折半下見頭除腳見腳除頭上是雞下是兔裴肅在越多齊此外惟嗜兔日再食陸贄在忠州不接人惟纂藥方行於世號曰集驗黃巢本王仙芝賊中判官芝死賊衆戴之為首遂日盛杜邠公先達人謂之老杜相公杜審權晚入謂之小杜相公劉蕡精於儒術常看文中子忿然而言曰才非殆庶擬上聖述作不亦過乎客曰文中子於六籍如何蕡曰若以人望文中子於六籍猶奴婢之於郎主耳後人遂以文中子為六籍奴婢博陵崔倕緦麻親同爨貞元以來言家法者以倕為首倕生六子一登相輔五任大僚太常卿邠太府卿鄷外臺尚書郾廷尉卿執金吾郇左僕射平章事鄲邠及郾五知舉得士百四十八人邠昆仲自始仕至貴達亦同居光德里一宅宣皇聞之歎曰崔鄲家門孝友可為士族之法矣鄲嘗搆小齊於别寢御筆題額號曰德星堂今京兆民因崔氏舊里立德星社秦寧緑李美小謂之嘉慶李此坊名也貞元十三年始制文武官隔假三日並行朝參開耀二年始以外司四品以下知政事者遂為平章事時初命郭待舉郭正一魏𤣥同三人同中書門下平章事也進士試帖經自調露二年始也寶應二年以羽林大將軍王仲升兼大夫六軍兼憲官始於此也建中元年沈既濟議改則天紀為皇后傳元和二年始令僧道隸左右街功德使其年方於建福門置百官待漏院舊但於光德車坊而已大中十一年賀正盧鈞以太子太師率百僚年八十餘矣聲容明暢舉朝稱服明年栁公權以少師率班亦八十矣自樂懸南趨至龍墀前氣力綿􅉵誤尊號中字罰一季俸人多恥之開元二十五年西幸駐蹕壽安連曜宫宫側有精舍庭內剎柱髙五丈有立於承露盤者上望見之初謂姦盜覘視宫掖使中官就竿下詰之其人曰吾欲捨身本是知湯前官被知湯中使邀錢物已輸十縑索仍不已每進湯水輒投土其中事若闕供責怒必死寧死於捨身爾具以聞詔髙力士召知湯中使賣絹於竿下謝之仍命徹尚舍衛尉幕委積於竿下其人禮十方畢以身投地墜於幕外舉體深紅色初尚微動須臾絶詔集文武從官於朝堂杖殺中使敕府縣厚葬殞者西京夀安縣有墨石山神祠頗靈神龍中神前有兩瓦子過客投之以卜休咎仰為吉覆為凶開元初鄭瑶慈澗題詩云岸與恩同廣波將慈共深涓涓勞日夜長似下流心開元四年中丞王怡以糾獲臧錢疊石重造永濟橋以代舟船行人普濟焉在夀安之西開元末功臣王逸客為間廏使莊在泥溝西岸數為劫盜捕訪不獲嚴安之為河南尉以狀白中丞宋遙遙入奏始擒之并獲賊腳崔誗誗在安定公主錦坊俱就執伏搜得骸骨兩井逸客以鐵券免死流嶺表從此洛陽北路清矣咸通中舉子乘馬惟張喬跨驢後敕下不許騎馬故鄭昌圖肥為時嘲詠鄭少師薰於里第植小松七本自號七松處士異代可對五栁先生初制節度使天下有八若諸州在節度內者皆受節度焉其福州經略使登州平海軍使不在節度之內李錡之誅也二婢配掖庭曰鄭曰杜鄭則幸於元和生宣皇帝是為孝明皇后杜即杜牧獻替録中云杜仲陽即杜秋也漳王養母長孫無忌之父晟於隋有功魏徴即長賢之子令狐德棻之父曰熙皆北史有傳李太尉以大中二年正月三日貶潮州司馬當年十月十六日再貶崖州司户大中三年十二月十日卒於貶所年六十四白樂天任杭州刺史攜妓還洛後却遣回錢唐故劉禹錫有詩答曰無那錢唐蘇小小憶君淚染石榴裙唐制湖州造茶最多謂之顧渚貢焙歲造一萬八千四百八斤焙在長城縣西北大厯五年以後始有進奉至建中二年袁髙為郡進三千六百串并詩刻石在貢焙故鴻漸與楊祭酒書云顧渚山中紫笋茶兩片此物但恨帝未得嘗實所歎息一片上太夫人一片充昆弟同啜後開成三年以貢不如法停刺史裴充鮮于叔明嗜蟠蟲權長孺嗜人爪甲此亦劉雍瘡痂之類也髙宗朝四品以下有名稱者皆知政事以平章事為名自郭待舉始也僕射是正宰相自房喬始也韋承慶出相除禮部尚書嗣立入拜鸞臺侍郎平章事時人語曰大郎罷相小郎拜相京兆戶曹月俸一百八索故謂之念珠曹李太尉太和七年自西川還入相上謂王涯今日除德裕人情怕否對曰忠良甚喜其中小人亦有怕者帝言曰須怕也涯時為鹽鐵使太和中朋黨之首楊虞卿張元夫蕭瀚後楊除常州張汝州蕭鄭州丞相乘肩輿元和後也裴休大中中在相一日賜對賜卿無畏休即論立儲君之意上曰若立儲君便是閒人遂不敢言長安戲場多集於慈恩小者在青龍其次薦福永夀尼講盛於保唐名德聚之安國士大夫之家入道盡在咸宜崔造拜相退位後言曰不得諸道金銅茶籠子近來總四掩也遂復起栁芳與韋述善俱為史學述卒書有未成者皆續成之升平公主宅即席李端擅場送王相之鎮韓翃擅場送劉相巡江淮錢起擅場武黃門之死也裴晉公為盜所刺隸人王義扞刃而斃度自為文祭之是歲進士撰王義傳者三之二李錡之誅也大霧三日不開或聞鬼哭內疑其寃詔許以葬都官故事吏部郎中二㕔先小銓次格式員外郎二㕔先南曹次廢置刑部分四覆戶部分兩稅度支案郎中判入員外郎判出舊說吏部為省眼禮部為南省舍人考功度支為振行比部得廊下食以飰從者號比盤張直方者世為幽帥癖於鷹犬後以昭王府司馬分務洛陽洛陽四旁翥者攫者見皆識之必羣噪長嘷而去長孫無忌奏别敕長流以為永例後趙公犯罪敕長流此亦為法自弊江融為左史後羅織受誅其尸起而復坐者三雖斷其頭似怒不息無何周興敗魚思咺性巧造匭函朱泚敗走昏迷不辨南北因問路於田父父曰豈非朱太尉耶源休止之曰漢皇帝父曰天地不長凶惡蛇鼠不為龍虎天網恢恢去將何適遂亡其所在及去涇州百餘里泚於馬上忽叩頭稱乞命因之墜馬良久却蘇左右問其故曰見假司農尋為韓旻梟之楊收之死也軍容楊𤣥價有力焉收有子為夀牧見收乘白馬臂朱弓彤矢有朱衣天吏控馬曰上帝許我讐楊𤣥價我射中之必死俄而價暴卒欣州刺史是天荒闕蓋歷任多死髙皇時有金吾郎將求此官果有蛇怪後亦絶之饒州餘干縣令宅亦如此天寶時翰林學士陳王友元庭堅撰韻英十卷未施行而西京陷胡庭堅卒文明以後天下諸州進雞牝變為雄者極多或半已化半死乃則天之兆也馮衮給事親仁坊有宅南有山庭院多養鵝鴨及雜禽之類常一家人掌之時人謂之鳥省大中初女蠻國入貢奉其國人危髻金冠瓔珞被體故謂之菩薩蠻當時倡優遂製菩薩蠻曲文士亦往往聲其詞也宣皇在藩時嘗從駕墮馬雪中寒甚困且渴求水於巡警者曰我光王也及以水進舉杯悉變為芳醪明皇為潞州别駕有軍人韓凝禮自謂明五兆因以食箸試之既而布卦一箸無故自起凡三偃三起徽安門舊雒城北面取西門也樓上先多雀鴿後亦絶無至清泰中帝上此樓自焚今俗謂之火燒門開元六年西幸至蘭峯頓乘輿每出所宿侍臣皆從既而馳逐原野或從官分散宰相即先於前頓朝堂列位乘輿至必鞭揖之方入是日上垂鞭盛氣不顧而入蘇宋懼蓋怒河南尹李朝隱橋頓不備也解之方息蘭峯宫在永寧縣西慶明三年置鷓鴣飛數逐月數如正月一日飛而止伏窠中不復起矣十二月十二日起最難採南人設網取之大中九年日官李景亮奏云文星暗科場當有事沈詢為禮部甚懼焉至是三科盡覆試宏詞趙拒等皆落吏部裴諗除祭酒天寶八年館驛使宋緷奏移稠桑路向晉王斜晉王斜者隋煬帝在藩邸揚州往來經此路蓋避沙路費馬力也野狐泉店在潼關之西泉在道南店後坡下舊傳云野狐掊而泉湧店人工為冷淘過者行旅止焉今法饌中有野狐泉者以菉粉為之亦象此也路嗣恭在江西並奏部下縣為緊望天后問張元一曰在外有何事元一曰外有三慶旱降雨一慶中橋新成萬代之利二慶郭霸新死百姓皆歡三慶也霸酷吏也為侍御史崔敬嗣武后時任房州刺史孝和安置在彼官吏多無禮嗣獨申禮待供給之及即位有益州長史崔敬嗣既同名姓御筆擬超拜後引與語知誤訪嗣已卒崔光逺即其孫也太和中上頗好食蛤蜊沿海官吏先時遞進人亦勞止一旦御饌中有擘不開者即焚香禱之俄變為菩薩梵相具足天后時有獻三足烏者左右或言一足僞耳天后笑曰但令史冊書之安用察其真僞令狐綯在相大事一取決於滈比元載之用伯和李吉甫之用德裕杜審權大中十二年知舉放盧處權有戲之曰座主審權門生處權可謂權不失權又乾符二年崔沆放崔瀣談者稱座主門生沆瀣一氣湖州歲貢黃黿子連蒂木瓜李景先自和牧謫為司馬戲湖守蘇特曰使君貴郡有三黃黿子五蒂木瓜特頗銜之韓洙與沈詢尚書中表詢憐洙許與成事如是歷四五年太夫人橋又念之復纍付於詢詢知舉大中九年也自第二人邐迤改為第七人方定及放榜誤為羅洙後詢見韓洙未嘗不深嗟其命大中元年魏扶知禮闈入貢院題詩曰梧桐葉落滿庭陰鎖閉朱門試院深曽是昔年辛苦地不將今日負前心及榜出為無名子削為五言以譏之天寶四載廣府因海潮漂一蜈蚣陸死割其一爪則得肉一百二十斤滋水驛在長樂驛之東睿皇在藩日經此㕔㕔西壁畫一人頭因題曰喚出眼何用苦深藏縮却鼻何畏不聞香陳嶠字景山閩人也孑然無依數舉不遂蹉跎輦轂至於暮年逮獲一名還鄉已耳順矣鄉里以宦情既薄身後無依乃以儒家女妻之至新婚近八十矣合卺之夕文士競集悉賦催粧詩咸有生荑之諷嶠亦自成一章其末曰彭祖向聞年八百陳郎猶是小孩兒座客皆絶倒嶠頗負詩名常有閒居詩曰小橋風月年年事爭奈潘郎老去何南部新書卷五
