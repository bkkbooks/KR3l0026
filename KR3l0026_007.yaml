body:
  text: 南部新書卷七宋錢易撰季敬彜宅在洛陽毓材坊土地最靈家人張行周事之有應未大水前預夢告求飲食至其日率其𩔖遏水頭並不衝圮邱爲致事還鄉特給祿俸之半既丁母喪蘇州疑所給請於觀察使韓滉滉以爲授官致仕本不理務特令給祿以恩養老臣不可在喪爲異命仍舊給之惟春秋二時羊酒之直則不給雖程式無文見稱折衷開元末有人好食羊頭者嘗辰出有怪在焉羊頭人身衣冠甚偉告其人曰吾未之神也其屬在羊吾以爾好食羊頭故来求汝汝輟食則已若不已吾將殺焉其人大懼遂不復食至德二年十月二十二日豐樂里開業寺有神人足跡甚多自寺門至佛殿先是閽人宿門下夢一人長二丈餘被金甲執槊立於寺門外俄而以手推其門扃鑰盡解神人即俯而入寺行至佛殿顧望久之而没閽人驚寤及曉視其門已開矣即具以夢白於寺僧共視見神人之跡遂告京兆以聞肅皇命中使驗之如其言段成式姪女乳母阿史本荆州人嘗言小時見鄰居百姓孔謙籬下有蚓口露雙齒肚下足如蚿長尺五行疾於常蚓謙惡遽殺之其年謙喪母及兄叔困不可得活長安安邑坊𤣥法寺本里人張頻宅也頻嘗供養一僧僧念法華經爲業積十餘年張門人譖僧通其侍婢因以他事殺之僧死後闔宅常聞經聲不絶張尋知其寃因捨宅爲寺建中二年南方貢朱采鳥形如戴勝善巧語養於宫中斃於巨鵰内人有金花紙上爲冩多心經者尋泚犯禁闈亦朱采之兆也元和以来舉人用虚語䇿子作賦若使陳詩觀風乃教人以妄爾沃州山禪院在剡縣南三十里頗爲勝境本白道猷居之太和二年有頭陀白寂然重修白居易爲其記白君自云白道猷肇開兹山白寂然嗣興兹山白樂天垂文兹山沃州與白氏有縁乎吳郡陸懐素貞觀二十年失火屋宇焚燒並從烟滅惟金剛般若經獨存函及縹軸亦盡惟經字竟如故一房光庭嘗送親故葬出定鼎門際晚且飢會鬻蒸餅者與同行數人食之素不持錢無以酬付鬻者逼之一房命就我取直鬻者不從一房曰乞你頭銜我右臺御史也可隨取直時人賞其放逸長安四年十月隂雨雪百餘日不見星明年正月誅張易之等裴垍入相之年才四十四鬚髮盡白杭州靈隱山多桂寺僧云此月中種也至今中秋朢夜往往子墜寺僧亦嘗拾得而巖頂崖根復産竒花氣香而色紫芳麗可愛人無有知其名者招賢寺僧取而植之郡守白樂天尤愛賞因名曰紫陽花温璋爲京兆尹一日聞挽鈐者三乃一鵶也尹曰是必有探其雛者来訴耳命吏隨之果得探雛者乃斃之天寶末有宻採艷色者當時號爲花鳥使吕向一本作尚獻美人賦以諷之有人問趙州師年多少師曰一串念珠使不盡終年一百二十歳奘法師至中印度居那爛陀寺館於幼日王院覺吳房第四重閣日供步羅果一百二十枚大人米等吳融字子華越州人弟蛻亦爲拾遺蛻子程爲吳越丞相尚武肅女程子光謙光逺二人皆爲元帥府推官入京並除著作郎皆去光字謙尋卒逺終於水部郎中累牧藩郡咸通中令狐綯嘗夢李德裕訴云吾獲罪先朝過亦非大已得請於帝矣子方持衡柄誠爲吾請俾窮荒孤骨得歸葬洛陽斯無恨矣他日令狐率同列上奏懿皇允納卒獲歸葬孔子廟始貞觀年立之文皇書額洎武后權政額中加大周二字至大中四年馮審爲祭酒始奏琢去之内外官職田三月三十日水田四月三十日麥田九月三十日以前上者入後人已後上者入前人程元振帥兵經畧河北夜襲鄴俘其男女千人去鄴八十里閱婦人有乳汁者九十餘人放歸鄴鄴人爲之設齋苗晉卿爲東都留守有兵健屢犯科禁罪當杖罰謂之曰留守鞭武人甚易捨之甚難今捨人之所難遂捨之武人自勵卒成善士含元殿側龍尾道自平階至上詰屈七轉由丹鳳門北望宛如龍尾下垂於地兩垠欄檻悉以青石爲之至今石柱猶有存者興慶宫九龍池在大同殿古基之南西對瀛洲門周環數頃水極深廣北望之渺然東西微狹中有龍潭泉源不竭雖歴冬夏未嘗減耗池四岸植嘉木垂栁先之槐次之榆又次之兵冦以来多被翦伐南中紅蕉花色紅有蝙蝠集花中南人呼爲紅蝠景通禪師初參仰山後住晉州霍山化緣將畢先備薪於郊野徧辭檀信食訖行至薪所謂弟子曰日午當来報至日午師自執燭登積薪上以笠置項後作圓光相手執拄杖作降魔杵勢立終於紅焰中滕王蛺蝶圖有名江夏斑大海眼小海眼村裏来菜花子令狐相綯以姓氏少族人有投者不恡其力由是逺近皆趨之至有姓胡冒令狐者進士温庭筠戲爲詞曰自從元老登庸後天下諸狐悉帶令貞觀六年王珪任侍中通貴漸久不營私廟四時猶祭於寢爲有司所彈文皇優容之特爲置廟於永樂坊東北角司刑司直陳希閔以非才任官庶事凝滯司刑府史目之爲髙手筆言秉筆支頷半日不下故目之髙手筆又號按孔子言竄削至多紙面穿穴故名按孔子陳懐卿嶺南人也養鴨百餘頭後於鴨欄中除糞中有光爚爚然試以盆水沙汰之得金十兩乃覘所食處於舍後山足下因鑿有䴸金銷得數千斤時人莫知懐卿遂巨富仕至梧州刺史晉吳修爲廣州刺史未至州有五仙人騎五色羊負五穀而来今州㕔梁上畫五仙人騎五色羊爲瑞故廣南謂之五羊城裴旻山行有山蜘蛛垂絲如疋布將及旻旻引弓射殺之大如車輪因斷其絲數尺收之部下有金瘡者剪方寸貼之血立止魏知古年七十卒於工部尚書妻蘇氏不哭含訖舉聲一慟而絶同日合葬曲江池天祐初因大風雨波濤震盪累日不止一夕無故其水盡竭自後宫闕成荆棘矣今爲耕民畜作陂塘資澆溉之用毎至清明節都人士女猶有汎舟於其間者九龍池上巳日亦爲士女汎舟嬉遊之所白傅葬龍門山河南尹盧貞刻醉吟先生傳立於墓側至今猶存洛陽士庶及四方遊人過其墓者必奠以巵酒塚前常成泥濘裴說應舉只行五言詩一卷至来年秋復行舊卷人有譏者裴曰只此十九首苦吟尚未有人見知何暇别行卷哉咸謂知言宣皇製泰邊陲曲撰其詞云海岳晏咸通此符武皇之號也李郃爲賀牧與妓人葉茂連江行因撰骰子選謂之葉子咸通以来天下尚之繡嶺宫明慶二年置在硤石縣西三里亦有御湯崔圓妻在家見二鵲搆巢共銜一木大如筆管長尺餘安巢中衆悉不見俗言見鵲上梁必貴李訥僕射性卞急酷尚奕棊毎下子安詳極於寛緩往往疎忘怒作家人輩則宻以奕具陳於前訥觀便忻然改容取其子布算都忘其恚矣懴之始本自南齊竟陵王因夜夢往東方普光王如来所聽彼如来說法後因述懴悔之言覺後即賔席梁武王融謝眺沈約共言其事王因兹乃述成竟陵集二十篇懴悔一篇後梁武得位思懴六根罪業即將懴悔一篇乃召真觀法師慧式遂廣演其文述引諸經而爲之故第二卷中發菩提心文云慧式不惟凡品輕摽心志實由渇仰大乗貪求佛法依倚諸經取譬世事即非是爲郄后所作今之序文不知何人所作與本述不同近南人新開印本去其慧式二字蓋不知本末也白仁哲龍朔中爲虢州朱陽尉差運米遼東入海遇風四望昏黒仁哲憂懼急念金剛經三百遍忽如夢寐見一梵僧謂曰汝念真經故来救汝須臾風定八十餘人俱濟鯉脊中鱗一道毎鱗上有小黒㸃大小皆三十六鱗唐律取得鯉魚即宜放仍不得喫號赤鯶公賣者決六十三原之南薫店貞元末有孟媪者百餘歳而卒年二十六嫁張詧詧爲郭汾陽左右與媪貌相𩔖詧死媪偽衣丈夫衣爲詧弟事汾陽又凡一十五年巳年七十二矣累兼大夫忽思煢獨遂嫁此店潘老爲婦誕二子曰滔曰渠滔年五十四渠年五十二連山張大夫摶好養猫兒衆色備有皆自製佳名毎視事退至中門數十頭拽尾延脰盤踥入以絳紗爲幃聚其内以爲戲或謂摶是猫精昇平裴相昆弟三人俱盛名朝中品藻謂俅不如儔儔不如休貞元十三年二月授許孟容禮部員外郎有公主之子請兩館生孟容舉令式不許主訴於上命中使問狀孟容執奏竟不可奪遷本曹郎中鄭致雍未第求婚於白州崔相逺初許而崔有禍女則填宫至開平中女託疾出本家致雍復續舊好親迎之禮亦無所闕尋崔氏卒杖絰朞周莫不合禮士林以此多之塲中翹首一舉狀頭脫白授校書郎入翰林與丘門同勅不數年卒鎮州普化和尚咸通初將示滅乃入市謂人曰乞一領直掇人或與披襖或與布裘皆不受振鐸而去時臨濟令送與一棺師笑曰臨濟厮兒饒舌便受之乃告辭曰普化明日去東門死也郡中相率送出城師厲聲曰今日葬不合青鳥乃曰第二日南門遷化人亦隨之又曰明日出西門去人出漸稀已出旋返人意稍怠第四日自檠棺出北門外振鐸入棺而逝人奔走出城掲棺視之已不見惟聞鐸聲漸逺莫測其由張鑑父齊丘酷信釋氏毎旦更新衣執經於像前念金剛經十五遍積十年不懈永泰初爲朔方節度使衙内有小將負罪懼事露乃扇動軍人數百定謀反叛齊丘因衙退於小㕔閒行忽有兵數十露刃走入齊丘左右惟奴僕遽奔宅門過小㕔數步迴顧又無人疑是鬼物將及宅其妻女奴婢復呌呼出門云有兩甲士身出㕔屋上時衙隊軍健聞變持兵亂入小㕔前見十餘人屹然庭中垂手張口投兵於地衆遂擒縛五六人瘖不能言餘者具首云欲上㕔忽見二士長數丈瞋目叱之初如中惡齊邱因之斷酒肉天寶中哥舒翰爲安西節度使拓地數千里甚著威令故西鄙人歌曰北斗七星髙哥舒夜帶刀吐蕃總殺盡更築兩重壕時差都知兵馬使張擢上都奏事值楊國忠專權好貨擢逗留不返因納賄交結翰續入朝奏事擢知翰至求國忠拔用國忠乃除擢兼御史大夫充劍南西川節度使勅下就第辭翰翰命部下就執於庭數其罪而殺之俄奏聞帝却賜擢屍更令翰決一百至徳初安史之亂河東大飢荒地十五里生豆穀一夕埽而復生約得五六千石其米甚圓細復美人皆頼焉李徳裕幼時嘗於明州見一水族有兩足嘴如雞魚身終莫辨之劉晏任吏部與張繼書云博訪羣材揖對賓客無如戴叔倫吉頊之父哲爲冀州長史與頊娶南宫縣丞崔敬女崔不許因有故脅之花車卒至崔妻鄭氏抱女大哭曰我家門戸底不曽有吉郎女堅臥不起小女自當登車而去頊後入相雷公墨雷州之西有雷公廟彼中百姓每年配納雷鼓雷車人有以黄魚彘肉同食者立遭雷震人皆敬而憚之毎大雷後人多於野中拾得黳石謂之雷公墨扣之鏘鏘然光瑩如漆又於霹靂處或土木中收得如楔如斧者謂之霹靂楔與兒帶皆辟驚邪與孕婦人磨服爲催生藥皆有應驗訶子湯廣之山村皆有訶梨勒樹就中郭下法性寺佛殿前四五十株子小而味不澀皆是陸路廣州毎歳進貢只採兹寺者西廊僧院内老樹下有古井樹根蘸水水味不鹹院僧至訶子熟時普煎此湯以延賓客用新訶子五顆甘草一寸並拍破即汲樹下水煎之色若新茶味如酪乳服之消食踈氣諸湯難以比也佛殿東有禪祖慧能受戒壇壇畔有半生菩提樹禮祖師啜乳湯者亦非俗客也近李夷庚自廣州来能煎此味士大夫争投飲之天授三年始置試銜李延夀所撰南北史因父太師先有纂集未畢追終先志凡十六載方畢合一百八十卷並表上之其表云北史起魏登國元年盡隋義寧二年凡三代二百四十年兼自東魏天平元年盡齊隆化二年又四十四年行事總編爲本紀十二卷列傳八十八卷謂之北史南史起宋永初元年盡陳禎明三年四代一百七十年爲本紀十卷列傳七十卷謂之南史南北兩朝合一百八十卷其表云鳩集遺逸以廣異聞去其冗長揚其菁華既撰自私門不敢寢黙又云未經聞奏不敢流傳輕用陳聞伏深戰越元相稹之薨也卜葬之夕爲火所焚以煨燼之餘瘞之也李徳裕自西川入相視事之日令御史臺牓興禮門朝官有事見宰相者皆須牒臺其他退朝從龍尾道出不得横入興禮門於是禁省始静天寶中有樵人入山醉臥爲蛇所吞因以樵刀畫腹得出久之方悟自爾半身皮脫如白風狀上官昭容儀之孫也其母將誕之夕夢人與秤曰持此秤量天下文士母視之曰秤量天下豈是汝耶口中嘔嘔如應曰是徳皇西幸知星者奏曰逢林即住及至奉天奉天尉賈隱林入謁遂拜侍御史睿皇時司馬承禎歸山乃賜寶琴花帔以送之公卿多賦詩以送常侍徐彦伯撮其美者三十餘篇爲製序名白雲記蓋承禎號白雲子也開元八年穀水夜半漲時伐契丹兵營於彼漂沒二萬人惟行綱夜摴蒱不睡接髙獲免衞中行自福察有贓流於播州會赦北還死於播之館置於臼塘中南人送死無棺槨之具稻熟時理米鑿木若小舟以爲臼土人呼爲臼塘范液有口才薄命所向不偶曽爲詩曰舉意三江竭興心四海枯南遊李邕死北望宋珪殂進士周逖改次千字文更撰天寶應道千字文將進之請頒行天下先呈宰執右相陳公迎問之曰有添換乎逖曰翻破舊文一無添換又問翻破盡乎對曰盡右相問枇杷二字如何翻破逖曰惟此兩字依舊右相曰若如此還未盡逖逡巡不能對御史舊例初入臺陪直二十五日節假直五日謂之伏豹直百司州縣初授官陪直者有此名杜易簡解伏豹之義云直宿者離家獨宿人情所難其人初蒙榮拜故以此相處伏豹直者言衆官皆出此人猶留如藏伏之豹伺候待搏故曰伏豹耳韓琬則解爲爆直言如燒竹過節則爆封演以爲舊說南山赤豹愛其毛體毎雪霜霧露諸禽獸皆出取食唯赤豹深藏不出故古人以喻賢者𨼆居避世鮑明逺賦云豈若南山赤豹避雨霧而深藏此言伏豹直者蓋取不出之義初官陪直已有伏豹之名何必以遇節而比燒節之爆也近代通謂府廷爲公衙即古之公朝也字本作牙詩曰祈父予王之爪牙祈父司馬掌武備象獸以牙爪爲衞故軍前大旗謂之牙旗出師則有建牙禡牙之事軍中聴號令必至牙旗之下與府朝無異近俗尚武是以通呼公府公門爲牙門字稱訛變轉爲衙官銜之名蓋興近代當是選曹補授須存資歴聞奏之時先具舊官名品於前次書擬官於後使新舊相銜不斷故曰官銜亦曰頭銜所以名銜者言如人口銜物取其連續之意又如馬之所銜以制其首前馬已進後馬續来相似不絶者古人謂之銜尾相屬即其義也薛宜僚會昌中爲左庶子充新羅册贈使由青州泛海船頻阻惡風雨至登州却漂回青州郵傳一年節度烏漢貞加待遇有籍中飲妓段東美者薛頗屬情連帥置於驛中是春薛發日祖筵嗚咽流涕東美亦然乃於席上留詩曰阿母桃花方似錦王孫草色正如烟不須更向滄溟望惆悵歡娛恰一年薛到外國未行册禮旌節曉夕有聲旋染疾謂判官苗田曰東美何故頻見夢中乎數日而卒苗攝大使行禮薛張櫬迴及青州東美乃請告至驛素服奠哀號撫棺一慟而卒情緣相感頗爲竒事沈詢嬖妾有過私以配内豎歸秦詢不能禁既而妾猶侍内歸秦恥之乃挾刃伺隙殺詢及其夫人於昭義使衙是夕詢嘗宴府中賓友乃更歌著詞令曰莫打南来雁從他向北飛打時雙打取莫遣兩分離及歸而夫妻併命時咸通四年顧非熊少時嘗見欝棲中壊綠裙幅旋化爲蝶張周封亦言百合花合之泥其隙經宿亦化爲大蝶胡淛者吳少誠之卒也爲辯州刺史好撃毬南方馬庳小不善馳淛召將吏蹴鞠且患馬之不便玩習因命夷民十餘輩肩舁據輦撝杖肩者且繫旋環如風稍怠淛即以䇿叩其背犯鞭亟走淛用是爲笑樂三藏謂大乗中及薛婆多部諸小乗經量部師惟立二藏比西天宗部各異一素怛䌫藏此云契經能契於理及攝生故佛地論云能貫攝故名爲經佛初成道爲五俱輪等說四諦十二行法即三轉法輪經爲首此幻化相而談名幻性說初成正覺爲諸菩薩稱法界性說華嚴經譬如日出先照髙山爾時聲聞在會如此方時即四十二章經爲首開元錄即大般若經爲首二毗奈耶藏此云調伏如期所應爲調伏故攝論云調和控御身語等業制伏滅除諸惡行故律即以四分戒經爲上首即佛成道十二年中說若約數至此方即遺戒經爲首又律有大乗山乗律令此律藏即以菩薩地持經爲首亦名爲論亦名菩薩戒此開元次第也三阿毗達磨藏達磨此云法阿毗有四義此云對法數法伏法通法對法向無注涅槃故有又通釋契經義故此藏亦名鄔波提鑠古云優波提舍此云論議又曰摩呾里迦古曰摩徳里迦此云本無自佛在世及滅度後大小乗各有制造不可見其先後若依開元錄即大智度論爲首龍樹菩薩造聖賢集傳契經應頌記别諷誦自說緣起譬喻本事本生方廣希法論議亦名爲十二部經謂部𩔖也以轉法輪三周總說十二行相能詮彼教分𩔖故分十二人破十二有支人十二處所說法亦爲十二示上蜀刑部侍郎李仁表寓居許州將入貢於春官時薛能尚書爲鎮先繕所業詩五十篇以爲贄濡翰成軸於小亭凭几閱之未三五首有戴勝自簷飛入立於几案之上馴狎良乆伸頸嚲翼而舞向人若將語乆之又轉又舞向人若如是者三超然飛去心異之不以告人翌日投詩薛大加禮待居數日以其子妻之濠州西有髙塘館附近淮水御史閻敬愛宿此館題詩曰借問襄王安在哉山川此地勝陽臺今朝寓宿髙塘館神女何曽入夢来軺軒来往莫不吟諷以爲警絶有李和風者至此又題詩曰髙唐不是這髙塘淮畔江南各一方若向此中求薦枕參差笑殺楚襄王讀者莫不解顔後因失印求新鑄始添濠字喬林天寶初自太原赴舉過大梁有申屠生善鍳人謂之曰惜其情反於氣心不稱質若交極位不至百日年過七十當主非命咸如其言後在相位八十七日以七月七日生七月七日誅蕭穎士開元中年十九擢進士第儒釋道三教無不該通然性褊躁忽忿戾舉世無比常使一傭僕杜亮毎一決責便至力殫亮養瘡平復爲其指使如故人有勸之去亮曰豈不知但以愛其才而慕其博奥以此戀戀不能去卒至於死耳南部新書卷七
