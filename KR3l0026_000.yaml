body:
  text: 南部新書小説家類一雜事之屬提要臣等謹案南部新書十卷宋錢易撰舊本卷首題籛後人蓋以姓譜載錢氏出籛鏗也易字希白吳越王悰之子真宗朝官至翰林學士是書乃其大中祥符間知開封縣時所作皆記唐時故實間及五代多録軼聞瑣事而朝章國典因革損益之故亦雜載其中故雖小説家言而實有裨於史學朝公武讀書志作五卷焦竑國史經籍志作十卷今考其標題自甲至癸以十干為紀則作十卷者是也世所行本多非完書兼有從曽慥類説中摘録而成半經刪削者此本共八百餘條首尾完具猶為全帙云乾隆四十二年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:bf0193671503acfea1e31cf48a79a3b7c85330ebb5d3d672a5cfbfa170a43563
