body:
  text: 南部新書卷四宋錢易撰武德元年以長安令獨孤懷恩為工部尚書萬歲通天元年四月一日詔神嶽中天王可尊為神嶽中天皇帝至神龍元年復為王孫智諒開元年中內殿修齊奉詔投龍於吉之玉笥山泊舟江側見異氣在東川之中疑有古跡遂於閣皂山掘得銅鐘一枚重百餘斤鐘下得玉像三身因置閣皂觀省中諸郎中不自員外拜者謂之土山頭果毅言其不歷清資便拜髙品似長征兵士便授邊逺果毅也先天中王主敬為侍御史自以才望華妙當入省臺前行忽除膳部員外微有惋悵吏部郎中張敬志詠曰有意嫌兵部專心望考功誰知腳蹭蹬却落省牆東蓋膳部在省最東北隅也開元十八年吏部尚書裴光庭始奏用循資格鄭畋少女好羅隱詩常欲妻之一旦𨼆謁畋畋命其女隔簾視之及退其女終身不讀江東篇什舉子或以此謔之答曰以貌取人失之子羽衆皆啓齒栁公權有筆偈云圓如錐捺如鑿不得出只得却義是一毛出即不堪用大中中李太尉三貶至朱崖時在兩制者皆為擬制用者乃令狐綯之詞李虞仲集中此制尤髙未知孰是往往有俗傳之制云蛇用兩頭狐搖九尾鼻不正而身豈正眼既斜而心亦斜此仇家謗也李含光善書或曰筆跡過其父一聞此語而終身不書含光即司馬天師弟子長安太廟殿即苻堅所造省中司門都官屯田虞部主客皆閒簡無事時諺曰司門水部入省不數又角抵之戲有假作吏部令史及虞部令史相見忽然俱倒悶絶良久云冷熱相激有李參軍者善相笏知休咎必驗呼為李相笏又有龍復本者無目凡有象簡竹笏以手捻之必知官祿年夀馬周之妻賣䭔媪也即媪引周為常何之客中和初黃巢將敗有謡云兼巢須走秦山東死在翁家中巢死之處民家果姓翁蕭廩新為京尹楊復恭假子􅀈罪仍毆地界廩新曰新除京尹敢打所由將令百司難逃一死由是內外畏服韋夏卿善知人道逢再從弟執誼從弟渠牟及丹三人皆第二十四並為郎官簇馬久之曰今日逢三二十四郎輒欲題目之謂執誼曰必為宰相善保其末謂渠牟曰弟當别承主上恩而速貴為公卿謂丹曰三人之中弟最長逺而位極旄鉞皆如其言陳少遊撿校職方員外郎充回紇使撿校郎官自少遊始也長安有龍戶見水色即知有龍或引出但如鰍魚而已栁圭是韋慤門生慤嘗云三十人惟栁先輩便進燈燭下本江陵有士子遊於交廣間而愛姬為太守所取納於髙麗坡底及歸因寄詩曰惆悵髙麗坡底宅春光無復下山來守見詩遂遣還韋澳與蕭置大中中同為翰林學士每寓直多召對內使云但兩侍郎入直即內中便知宣㫖又澳舉進士時日者陳子諒號為陳特快云諸事未敢言惟青州節度使不求自得果除拜栁公綽家藏書萬卷經史子集皆有三本色采尤華麗者鎮庫又一本次者長行披覽又一本又次者後生子弟為業皆有厨格部分不相參錯張巡許逺宋州立血食廟謂之雙廟至今歲列常祀㑹昌元年三月二十五日敕以其日為老君降誕假一日陽城貞元中與三弟隱夏陽山中相誓不婚啜菽飲水有蒼頭曰都兒與主同志李約為兵部員外郎勉子也與主客員外郎張諗同官二人每單牀靜言達旦不寐故約贈韋徴君况詩曰我有中心事不向韋三說秋夜洛陽城明月照張八鄭畋字台文亞之子也亞任桂察時生故小字桂兒薛收與從父兄子元敬族兄子德音齊名時人謂之河東三鳳鄭俶依陽城讀書經月餘與論國風俶不能往復一辭因縊於梁下城哭曰我雖不殺俶俶因我而死為之服緦麻裴談過蘇瓌小許公方五歲乃試庾信枯樹賦將及終篇避談字因易其韻曰昔年移栁依依漢陰南今看搖落悽愴江潯潭樹猶如此人何可任堪中書令李嶠有三戾性好榮遷憎人升進性好文章憎人才華性好貪濁憎人受賂肅皇常舉衣袖示韓擇木曰朕此衣已三浣矣封德彜即楊素之壻素為僕射常撫其座曰封郎必居此座後果如其言天下貢賦惟長安縣貢土萬年縣貢水開元十八年蘇晉為吏部侍郎而侍中裴光庭每過官應批退者但對衆披簿以朱筆㸃頭而已晉遂榜選門曰門下㸃頭者更引注擬光庭不恱以為侮已景龍以來大臣初拜官者例許獻食謂之燒尾開元後亦有不燒尾者漸而還止長慶初每大獄有司斷罪又令給事中中書舍人參酌出入百司呼為參酌院今審刑即其地也李翺在湘潭收韋江夏之女於樂籍中趙驊亦於賊人贖江西韋環之女或厚給以歸親族或盛飾以事良家此哀孤之上也禮部駁榜者十一月出粗駁者謂有狀無解無狀細駁謂書其行止之過兩省諫議無事不入每遇入省有厨食四孔炙中書舍人時謂宰相判官宰相親嫌不拜知制誥為直腳又云不由三事直拜中書舍人者謂之撻額裹頭天寶五載巴東石開有天尊像及幢蓋盧從願景雲中典選有聲稱時人曰前有裴馬後有盧李裴即行儉馬即馬戴李即朝隱上元二年夏於景龍觀設髙座講論道釋二教遣宰臣百僚悉就觀設齊聽論仍賜錢有差貞元二年江淮運米每年二百萬斛雖有此制而所運不過四十萬王栖曜善射嘗與文士遊虎邱寺平野霽日先以一箭射空再發中之江東文士梁肅以下咸歌詠之李輔國為殿中監常在銀臺門受事置察事㕔子數十人官吏有小過無不伺知長安三月十五日兩街看牡丹奔走車馬慈恩寺元果院牡丹先於諸牡丹半月開太真院牡丹後諸牡丹半月開故裴兵部憐白牡丹詩自題於佛殿東頰脣壁之上太和中車駕自夾城出芙蓉園路幸此寺見所題詩吟玩久之因令宫嬪諷念及暮歸大內即此詩滿六宫矣其詩曰長安豪貴惜春殘爭賞先開紫牡丹别有玉杯承露冷無人起就月中看兵部時任給事盧家有子弟年已暮而猶為校書郎晚取崔氏子崔有詞翰結褵之後微有嫌色盧因請詩以述懷為戲崔立成曰不怨盧郎年紀大不怨盧郎官職卑自恨為妻生較晚不見盧郎年少時開元十九年四月於京城置禮㑹院院屬司農寺在崇仁坊南街後元和中拾遺楊歸厚私以婚禮上言借禮㑹院因此貶官蘭亭序武德四年歐陽詢就越訪求得之始入秦王府麻道嵩奉教搨兩本一送辨才一王自收嵩私搨一本於時天下草創秦王雖親總戎蘭亭不離肘腋及即位學之不倦至貞觀二十三年禇遂良請入昭陵後但得其模本耳栁子溫家法常命苦參黃連熊膽和為丸賜子弟永夜習學含之以資勤苦陸龜蒙居震澤之南巨積莊産有鬭鴨一欄頗極馴養一旦有驛使過挾彈斃其尤者於是龜蒙詣而駭之曰此鴨能人語復歸家少頃手一表本云見待附蘇州上進使者斃之何也使人恐盡與橐中金以糊其口龜蒙始焚其章接以酒食使者俟其稍恱方請其人語之由曰能自呼其名使者憤且笑拂袖上馬復召之盡還其金曰吾戲之耳宣皇好文嘗賦詩上句有金步搖未能對進士溫岐即庭筠續之岐以玉跳脫應之宣皇賞焉令以甲科處之為令狐綯所沮遂除方城尉初綯曽問故事於岐岐曰出南華真經非僻書也冀相公燮理之暇時宜覽古綯怒甚後岐有詩云悔讀南華第二篇黃巢令皮日休作䜟詞云欲知聖人姓田八二十一欲知聖人名果頭三屈律巢大怒蓋巢頭醜掠鬢不盡疑三屈律之言是其譏也遂及禍王承業為太原節度使軍政不修詔御史崔衆交兵於河東衆侮易承業或裹甲持槍突入承業㕔事玩謔之李光弼聞之素不平至是衆交兵於光弼光弼以其無禮不即交兵令收繫之中使至除衆御史中丞懷其敕問衆所在光弼曰有罪繫之矣中使以敕示光弼光弼曰今只斬侍御史若宣制命即斬中丞若拜宰相即斬宰相中使懼遂寢而還翌日斬衆於碑堂之下貞元十五年以諫議田敦為兵部郎中上將用敦為兵部侍郎疑其年少故有此拜貞元四年九月二日敕今海隅無事蒸庶小康其正月晦日三月三日九月九日宜任文武百僚擇勝地追賞為樂仍各賜錢以充宴㑹每歲正旦曉漏已前宰相三司使大金吾皆以樺燭百炬擁馬方布象城謂之火城甲賦中有火城賦仍雜以衣繡鳴珂焜耀街陌如逢宰相即諸司火城悉皆撲滅或其年無仗即中書門下率文武百僚詣東上閣門橫行拜表稱慶內臣宣答禮部員外郎受諸道賀表取一通官最髙者坼表展於坐案上跪讀訖閣門使引表接入內却出宣云所進賀表如有太后即宰相率兩班赴西內稱賀李泌有讜直之風而好談謔神仙鬼道或云嘗與赤松王喬安期羡門等遊處坐此為人所譏王起太和中文皇頗重之曽為詩寫於太子之笏髙駢在維揚曽遣使致書於浙西周寶曰伏承走馬已及奔牛今附虀一瓶葛粉十斤以充道路所要蓋諷其為虀粉矣李山甫咸通中不第後流落河朔為樂彥禎從事多怨朝廷之執政嘗有詩云勸君不用誇頭角夢裏輸嬴總未真張祜字承吉有三男一女桂子椿兒椅兒桂子椿兒皆物故惟女與椅在椅兒名虎望亦有詩後求濟於嘉興監裴𢎞慶署之冬瓜堰官望不甘慶曰祜子之守冬瓜所謂過分陳夷行鄭覃在相請經術孤單者進用李珏與楊嗣復論地胄詞彩者居先每延英議政率先矛盾無成政但寄之頰舌而已康子元越人念易數千遍行坐不釋卷開元中張說薦為麗正學士元行沖在太常有人於古墓得銅器似琵琶而身正圓人無識者沖曰此阮咸琵琶也乃令匠人以木為之至今乃有大中十二年七月十四日三更三㸃進朝惟宰臣夏侯孜獨到衙以大夫李景讓為西川節度使時中元假通事舍人無在館者麻案既出孜受麻畢乃召當直中書舍人馮圖宣之捧麻皆兩省胥吏自此始令通事舍人休浣亦在館俟命故事京兆尹在私第但竒日入府偶日入遞院崔郢大中中為京兆尹囚徒逸獄始命造廨宅京尹不得離府後郢敗韋澳自內署面授京尹賜度支錢二萬索令造府宅咸通六年放宫人沈氏養親沈氏入宫五十八年有父居滻水年一百一十母年九十五因為築室而居頒金帛碓磑敕本縣放科役終沈氏之世杜羔妻劉氏善為詩羔纍舉不第將至家妻先寄詩與之曰良人的的有竒才何事年年被放回如今妾面羞君面君若來時近夜來羔見詩即時回去尋登第妻又寄詩云長安此去無多地鬱鬱葱葱佳氣浮良人得意正年少今夜醉眠何處樓令狐綯在相擢裴坦自楚州刺史為職方郎中知制誥裴休以坦非才拒之不勝及坦上事謁謝於休休曰此乃首台謬選非休力也立命肩輿便出兩閣老吏云自有中書未有此事至坦主貢擢休之子𢎞上第時人云欲蓋而彰此之謂也崔慎由鎮西川有異人張叟者與跡熟因謂之曰今四十無子良可懼也叟曰為公求之惟終南翠微寺有僧絶粒五十五年矣君宜遺之服玩若愛而受之則其嗣也果受之僧尋卒遂生一男叟復相之曰貴則過公恐不得其終因字曰衲僧又云緇郎即徹也陽城出刺道州太學生二百七十人詣闕乞留疏不得上天祐元年八月前曲沃令髙沃納史館書籍三百六十卷授監察賜緋張裼尚書牧晉州外貯營妓生子曰仁龜乃與張處士為假子居江淮間後裼死仁龜方還長安云江淮郎君至家皆愕然蘇夫人收之齒諸兄之列仁龜後以進士成名歷侍御史因奉使江浙而死關圖有一妹有文學善書札圖嘗語同僚曰某家有一進士所恨不巾櫛耳後適常氏修之母也修咸通六年登科張說女嫁盧氏為其舅求官說不語但指搘牀龜而示之女歸告其夫曰舅得詹事矣李紳在維揚日有舉子訴揚子江舟子不渡恐失試期紳判云昔在風塵曾遭此輩今之多幸得以相逢各拋付揚子江其苛急也如此後因科蛤為屬邑令所抗云奉命取蛤且非其時嚴冬沍寒滴水成凍若生於淺水則猶可涉脛而求既處於深潭非沒身而不得貴賤則異性命不殊紳大慙而止終以吳湘獄仰藥而死劉三復能記三生事云曽為馬馬常患渴望驛而嘶傷其蹄則連心痛後三復乘馬過磽確之地必為緩轡有欹石必去之嚴惲字子重善為詩與杜牧友善皮陸常愛其篇什有詩云春光冉冉歸何處更向花前把一杯盡日問花花不語為誰零落為誰開七上不第卒於吳中于志寧為僕射預修史恨不得學士來濟為學士恨不得修史大中中于琮選尚永福公主忽中寢洎審㫖上曰朕此女子因與之㑹食對朕輒折匕箸情性如此恐不可為士大夫妻尋改尚廣德公主咸通六年滄州鹽院吏趙鏻犯罪至死既就刑有女請隨父死云七歲母亡蒙父私盜官利衣食之今父罪彰露合隨其法鹽院官崔據義之遂以其事聞詔哀之兼減父之死女又泣曰昔為父所生今為官所賜誓落髮奉佛以報君王因於懷中出刃立截其耳以示信既而待父減死罪之刑疾愈遂歸浮圖氏南部新書卷四
