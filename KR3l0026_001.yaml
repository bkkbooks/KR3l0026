  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0026_WYG_001-1a, image: WYG1036/WYG1036-0176c.png}
body:
  text: 南部新書卷一宋錢易撰自武德至長安四年以前尚書左右僕射並是正宰相初豆盧欽望拜左僕射不言同中書門下三品不敢參議朝政數日後始有詔加知軍國重事至景雲二年韋安石除僕射不帶同三品自後空除僕射不是宰相遂為故事至德二年宰相直主政事筆每人知十日至貞元十年又分每人輪一日執筆尚書諸廳歷者有壁記入相則以朱點之元和後唯膳部廳持國柄者最多時省中謂之朱點廳韋夏卿與弟正卿大厯中同日登制科皆曰今日盛事全歸二難之手韓昆大厯中為制科第三等敕頭代皇異之詔下日坐以采輿翠籠命近臣持采杖鞭之厚錫繒帛以示殊澤常衮自禮部侍郎入相時潘炎為舍人引麻因戲之曰留取破麻鞋著及衮視事不浹旬果除凌煙閣在西內三清殿側畫像皆北面閣中有中隔隔內面北寫功髙宰輔南面寫功髙侯王隔外面次第功臣證聖元年正月明堂災重造天册萬歲殿二年三月成號為通天宫項斯始未為聞人因以卷謁江西楊敬之楊甚愛之贈詩云幾度見君詩盡好及觀標格過於詩平生不解藏人善到處逢人説項斯未幾詩達長安斯明年上第上元中長安東內始置延英殿每侍臣賜對則左右悉去故直言讜議盡得上達李聽為羽林將軍有名馬穆皇在東宫諷聽獻之聽以總兵不從及即位太原擬帥皆不允謂宰臣曰李聽為羽林將軍不與朕馬是必可任遂降制開元御札云朕之兄弟唯有五人比為方伯歲一朝見雖載崇藩屏而有睽談笑是以輟牧人而各守京職每聽政之後延入宫中申友于之志詠棠棣之詩雍雍怡怡展天倫之愛也祠部省中謂之氷去聲廳言其清且冷也尚書省東南向陽通衢有小橋相承曰拗項橋言御史及殿中久次者至此必拗項而望南宫也都堂南門道東有古槐垂隂至廣或夜聞絲竹之音則省中有入相者俗謂之音聲樹二十四司印故事悉納直廳每郎官交印時吏人懸之於臂以相授頗覺為繁楊虔州虞卿任吏部員外郎始置匱加鐍以貯之人以為便至今不改笏始無囊皆摽笏於馬上張曲江清瘦不任乃置笏囊祕書省內落星石薛稷畫鶴賀知章草書郎令餘畫鳳相傳號為四絶元和中韓公武為校書郎挾彈中鶴一眼時人乃謂之五絶又省之東即右威衛荒穢摧毁其大廳逼校正院南對御史臺有人嘲之曰門緣御史塞廳被校書摧曹確楊收徐商路巖同秉政外有嘲之曰確確無餘事錢財總被收商人都不管貨賂幾時休李林甫寡學中表有誕子者以書賀之云知有弄麞之慶鄭注鎮鳳翔皆擇貞正之士以為幕席亦欲遏其邪行及注敗皆為監軍所誅溫大雅武德中為黃門侍郎弟彥博為中書侍郎髙祖曰我起義晉陽為卿一門爾後弟大有又除中書侍郎大有一作彥將中書省有磐石初薛道衡為內史侍郎常踞其石草詔後孫元超每見此石未嘗不泫然施肩吾與趙嘏同年不睦嘏舊失一目以假珠代其睛故施嘲之曰二十九人同及第五十七隻眼看花元和十五年也女道士魚玄機住咸宜觀工篇什殺婢緑翹甚切害事敗棄市崔四八即慎由之子小名緇郎天下呼油為麻膏故謂之麻膏相公開元中岐薛以下輪日載筆於乘輿前作內起居注四季朱印聨名牒送史館至天寶十載季冬已成三百卷率以五十幅黃麻為一軸雕檀軸紫鳳綾表遂别起大閣貯之祿山陷西京先以火千炬焚是閣移時灰滅故實録百不敘及一二小許公從工部侍郎除中書侍郎便共政事食明日加知制誥制誥舍人有政事食自此為始太和中上自延英退獨召栁公權對上不恱曰今日一場大竒楊嗣復李珏道張諷是竒才請與近密官鄭覃陳夷行即云是姦邪須斥之於嶺外教我如何即是公權奏曰允執厥中上曰如何即是允執厥中又奏嗣復李珏既言是竒才即不合斥於嶺外鄭覃夷行既云是姦邪亦不合職於近密若且授荆襄間一郡守此近於允執厥中旬日又召對上曰允執厥中向道也張遂為郡守賈曽除中書舍人以父名忠固辭之言者以中書是曹司名父之名又音同字别於禮無嫌曽乃就職開元七年賜百僚射金部員外盧廙職方郎中李畬俱非善射箭不及垜而互言工拙畬戲曰與盧箭俱三十步左右不曉畬曰畬箭去垜三十步盧箭去畬三十步李白山東人父任城尉因家焉少與魯郡諸生隱徂徠山號竹溪六逸天寶中遊會稽與吳筠隱剡中筠徴赴闕薦之於朝與筠俱待詔翰林俗稱蜀人非也今任城令廳石記白之詞也尚存焉江西私釀酒法尤嚴王仲舒廉察日奏罷之宰相門下省議事謂之政事堂永淳中裴炎為中書令始移就中書省政事印亦改中書門下之印開元中花萼樓大酺人衆莫遏遂命嚴安之定場以笏畫地無一輩敢犯盧㩦常題司空圖壁云姓氏司空貴官班御史卑老夫如且在不用歎屯竒龍朔中楊思玄恃外戚典選多排斥選士為選人夏彪訟之御史中丞郎餘慶彈奏免官許南陽曰固知楊吏部之敗或問之許曰一彪一狼共看一羊不敗何待開元皇帝為潞州别駕乞假歸京值暮春戎服臂鷹於野次時有豪氏子十餘輩供帳於昆明上時突會座中有持酒船唱令曰今日宜以門族官品坐上笑曰曽祖天子祖天子父相王臨淄郡王李某諸輩驚散上聨舉三船盡一巨觥而去襄王僭位朱玫秉政百揆失序逼李拯為內署拯嘗吟曰紫宸朝罷綴鵷鸞丹鳳樓前駐馬看惟有終南山色在晴明依舊滿長安拯終為亂兵所殺武德七年遣刑部尚書沈叔安攜天尊像賜髙麗仍令道士往彼講道德經自先天初至開元十五年儀同者四人姚崇宋璟王同皎王毛仲唐法親王食封八百戶有至一千戶公主三百戶長公主五百戶有至六百戶惟太平相王踰此制黃巢入青門坊市聚觀尚讓慰曉市人曰黃王為生靈不似李家其悖也如此長安令李濟得罪因奴萬年令霍晏得罪因婢故趙縱之奴當千訐縱陰事張鎰疏而杖殺之縱即郭令之聓建中末姚况有功於國為太子中舍人旱蝗之歲以俸薄不自給而以餒終哀哉田神功大厯八年卒於京師許百官弔喪上賜屏風茵褥於靈座并賜千僧齋以追福至德以來將帥不兼三事者哀榮無比栁渾舊名載為朱泚所逼及克復上言曰頃為狂賊點穢臣實恥稱舊名矧字畫帶戈時當偃武請改名渾渾後入相封宜城公謂之栁宜城韋顗著易藴甚有奧旨顗見素孫郭令終始之道無缺惟以譖怒判官張談誣奏杖殺之物議為薄張巡每戰大呼牙齒皆碎及敗尹子竒視之其齒存者不過三四初守寧陵也使南霽雲詣賀蘭進明乞救兵進明大宴霽雲不下咽自嚙一指示信進明終不應以至於破貞觀中擇官戶蕃口之少年驍勇者數百人每出遊獵持弓矢於御馬前射生令騎豹文韉著獸文彩衫謂之百騎至則天漸加其人謂之千騎孝和又增之為萬騎皆置使以領之彭偃與朱泚下偽詔曰幽囚之中神器自至豈朕薄德所能經營泚敗偃誅其妖亂也如此太和九年冬甘露事敗將相棄市王璠謂王涯曰當初勸君斬却鄭注斬之豈有此事也此雖臨刑之言然固當矣梁祖嘗言於昭皇趙崇是輕薄團頭於鄂州座上佯不識駱乳呼為山驢王遂阻三事之拜此亦挫韓偓也王皇后開元中恩寵日衰而不自安一日訴之曰三郎獨不記阿忠脫新紫半臂更得一斗麵為三郎生日作湯餅耶上戚然憫之而餘恩獲延三載武德初史館尚𨽻祕書省著作局貞觀三年移於門下省令宰相監修自是著作局始罷史職公孫羅為沛王府參軍撰文選音義十卷羅唐初人開元中裴光庭為侍中門下過官委主事閻麟之裁定隨口下筆時人語曰麟之口光庭手物議醜之張延賞怙權矜已嫉栁渾之守正使人謂之曰相公舊德但節言於廟堂則名位可久渾曰為吾謝張相公栁渾頭可斷而舌不可禁王縉在太原舊將王無縱等恃功且以縉儒者易之每事多違約束一朝悉召斬之將校股栗大厯中隴州貓鼠同乳率百僚賀崔祐甫獨奏曰仁則仁矣無乃失於性乎李雍自滑州上計也京洛阡陌聚觀以為古人蓋雍負美名頻被貶斥剝落在外也元德秀字紫芝為魯山令有清德天寶十三年卒門人相與諡為文行先生士大夫髙其行不名謂之元魯山駙馬都尉鄭潛曜睿皇之外孫尚明皇第十二女臨晉長公主母即代國長公主也開元中母寢疾曜刺血濡奏章請以身代及焚章獨神通許三字不化翼日主疾間至哉孝子也殿中監少監尚衣尚舍尚輦大朝會皆分左右隨繖扇立入閣亦同之牛僧儒三貶至循州本傳不言漏略也李景讓典貢年有李復言者納省卷有纂異一部十卷榜出曰事非經濟動涉虛妄其所納仰貢院驅使官却還復言因此罷舉古押牙者富平人有遊俠之才多竒計往往通於宫禁五月一日御宣政殿百僚相見之儀貞元以來常行之自後多闕崆洞山在松州屬龍州西北接蕃界蜀破後路不通非即崆洞也長安中秋望夜有人聞鬼吟曰六街鼓歇行人絶九衢茫茫空有月又聞有和者曰九衢日出何勞勞長安土盡槐根髙俗云務本西門是鬼市或風雨晦冥皆聞其喧聚之聲怪哉天寶中程修己以書進見嘗舉孝廉故明皇待之彌厚會春暮內殿賞牡丹花上頗好詩因問修己曰今京邑人傳牡丹詩誰為首出對曰中書舍人李正封詩天香夜染衣國色朝酣酒時楊妃侍上曰粧臺前宜飲以一紫金盞酒則正封之詩見矣髙宗欲廢王皇后立武昭儀猶豫未定許南陽宣言於朝曰田舍翁多收得十斛麥尚須換却舊婦况天子富有四海立一皇后有何不可上意乃定吁牝雞之孽洎移土德過始於南陽白樂天之母因看花墜井後有排擯者以賞花新井之作左遷穆皇嘗題柱曰此人一生爭得水喫張介然天寶中為衛尉卿因入奏曰臣今三品合列棨戟若列於帝城鄉里不知臣河東人也請列戟於故鄉上曰所給可列故鄉京城朕當别賜本鄉列戟介然始也京兆尹黎幹戎州人也嘗白事於王縉縉曰尹南方之子也安知朝禮其慢而侮人率如此總章中天子服婆羅門藥郝處俊諫曰修短有天命未聞萬乘之主輕服蕃夷之藥貞元中雍州經略使陳曇怒判官劉緩杖之二十五而卒卒之日曇得疾見緩為祟而卒韋氏稱制明皇憂甚獨密言於王琚琚曰亂則殺之又何疑開元中諸王友愛特甚嘗謂近侍曰思作長枕大被與諸王同臥鄱陽人張朝為猛獸所搏噬其家犬名小狸救之獲免中書省栁樹久枯死興元二年車駕還而栁活明年吕渭以為禮部賦題上甚惡之盧羣昔寓居鄭滑典貼得良田及為鄭滑節度悉召其主還之時以為美談自貞元來多令中官強買市人物謂之宫市日本國大臣曰真人猶中朝戶部尚書郭代公元振為西涼州牧時西蕃主帥烏質勒強盛元振與之立語俄頃雪下盈尺質勒既老久立歸而遂死人謂詭殺烏質勒路隨孝行清儉常閉門不見賔客狀貌酷似其先人以此未嘗視鏡又感其父沒蕃終身不背西坐其寢以西首南部新書卷一
