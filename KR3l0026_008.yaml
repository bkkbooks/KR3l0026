body:
  text: 南部新書卷八宋錢易撰三銓之士具慶之下多避憂闕除則皆不受對易於他人大厯來自丞相以下出使作牧無錢起郎士元詩祖送者時論鄙之海內溫湯甚衆有新豐驪山湯藍田石門湯岐州鳳泉湯同州北山湯河南陸渾湯汝州廣成湯兖州乾封湯邢州沙河湯此等諸湯皆知名之湯也並能愈疾驪山湯甫邇京邑帝王時所遊幸玄皇於驪山置華清宫每年十月車駕自京而出至春乃還百官羽衛并諸方朝集商賈繁會里閭闐咽焉山上起朝元閣上常登眺命羣臣賦詩正字劉飛詩最清拔蒙賞之右相李林甫怒飛不先呈已出為一尉竟不入而卒士子寃之喪亂以來湯所館殿鞠為茂草博物志云水源有石硫黃其泉則溫天下山泉由土石滋潤蓄而成泉耳如硫黃煎鑠久久理當焦竭有湯之處皆不出硫黃有硫黃之所不聞有湯事可明矣盧常侍鉟牧廬江日相座囑一曹生令署郡職不免奉之曹恱營妓名丹霞盧阻而不許會餞朝客於短亭曹獻詩云拜玉亭間送客忙此時孤恨感離鄉尋思往歲絶纓事肯向朱門泣夜長盧演為長句和而勗之曰桑扈交飛百舌忙祖亭聞樂倍思鄉樽前有恨慙卑宦席上無聊愛靚粧莫為狂花迷眼界須求真理定心王遊蜂採掇何時已却恐多言議短長令丹霞改令罰曹霞乃遂别為一調以嘲曹因舉座歡笑而散有范師姨者知人休咎為顔魯公妻黨顔嘗問之官階盡得五品否范笑曰鄰於一品顔郎所望何其卑也顔曰官階盡得五品身著緋衣帶銀魚兒子補齋郎余之滿望也范指座上紫絲食單曰顔郎衫色如是吳行魯尚書彭城人少年事內官西門思恭小心畏慎每夜常為溫溺器以奉之深得中尉之意一日嘗為中尉洗足中尉以足下文理示之曰如此文理爭教不作軍容使行魯拜曰此亦無憑西門曰何也行魯曰若其然者某亦有之何為常執僕厮之役乃脫履呈之西門嗟歎謂曰汝但忠孝我當為汝成之後為川帥元萬頃為遼東道管記作檄文譏議髙麗曰不知守鴨緑之險莫離支報云謹聞命矣遂移兵守之萬頃坐是流於嶺南駙馬韋保衡之為相以厚承恩澤大張權勢及敗長安市兒忽競彩戲謂之打圍不旬餘韋禍及吕衡州溫祖延父渭俱有盛名重任而吕氏家風先世碑志不假於人皆子孫自撰云欲傳慶善於信詞警文學之荒墜也栁芳上元中為史臣得罪竄逐黔中時髙力士亦徙巫州因相遇為芳言禁中事芳因論次其事號曰問髙力士後著唐厯此書不復出開元皇帝初即位曽醉中殺一人自此覆杯四十年不嘗酒味真定帥王公一日攜諸子入趙州院師坐而問曰大王會麼王曰不會師云自小持齋身已老見人無力下禪牀王公尤加禮重翌日令客將傳語師下禪牀受之侍者問和尚見大王來不下禪牀今日軍將來為甚麼却下禪牀師云非汝所知第一等人來禪牀上接中等人來下禪牀接末等人來三門外接端州以南三日一市謂之趂虛南中解毒藥謂之吉財俗云昔人遇毒其奴吉財得是藥與其主服遂解因名之又諺曰秋收稻夏收頭即婦人歲以截髮而貨以為常也長沙岑和尚因問話踏倒仰山仰山曰直下似箇大蟲自此諸方號為岑大蟲長沙嗣南泉法名景岑也安邑縣北門縣人云有一蝎如琵琶大每出來不毒人人由是無恐其靈積年也吕太一為戶部員外郎戶部與吏部鄰司時吏部移牒令戶部於牆宇自𥪡棘以備銓院之交通太一答曰眷彼吏部銓總之司當須簡要清通何必樹籬種棘省中賞其清俊開元二十七年明州人陳藏器撰本草拾遺云人肉治羸疾自是閭閻相效割股於今尚之開元二十八年天下無事海內雄富行者雖適萬里不持寸刃不齎一錢開元二年以江寧縣置金陵郡天寶四載改尚書無頗字為陂太平公主之出降薛紹也燎炬列焰槐樹多死永隆二年七月也上元二年制敕始用黃紙李客師為大將軍即靖之弟也好從禽人謂之鳥賊貞觀末吐蕃獻金鵝可盛酒三斗景雲二年除賀拔嗣河西節度使節度使自此始楊妃本夀王妃開元十八年度為道士入內裴子羽為下邳令張晴為縣丞二人俱有聲氣而善言語論事移時人吏竊相謂曰縣官甚不和長官稱雨贊府道晴終日如此非不和乎玄皇嘗召王元寶問其家財多少對曰臣請以絹一匹繫陛下南山樹樹盡臣絹未窮又玄皇御含元殿望南山見一白龍橫亘山間問左右皆言不見令急召元寶問之元寶曰見一白物橫在山頂不辨其狀左右貴臣啓曰何以臣等不見玄皇曰我聞至富可敵貴朕天下之貴元寶天下之富元寶又年老好戲謔出入市里人以為錢文有元寶字因呼錢為王老盛流於時矣河滿子者蜀中樂工將就刑獻此曲而不免當時云一聲去也又北史隋樂人王令言嘗臥於室內其子以琵琶於戶外彈作翻調安公子令言驚起問曰此曲有來逺近子曰頃來有之令言流涕曰帝往江東當不返矣子問之答曰此曲宫聲往而不反宫君也吾所以知之尋有江都之變江南無野狐江北無鷓鴣舊説也晉天福甲辰歲公安縣滄渚民家犬逐一婦人登木而墜為犬嚙死乃老狐也尾長七八尺則丘首之妖江南不謂無也但稀有耳蜀中彭漢卭蜀絶無惟山郡往往而有里人號為野犬更有黑腰尾長頭黑腰間燋黃或於村落鳴則有不祥事鶴瘡人血能療又説一世人則可惟洛中胡盧生爾鄭珏第十九應進士十九年及第十九人及第十九年後入相子遘太平興國中任正郎冀王朱友謙鎮河中常以一鐵毬杖晝夜為從遇怒者擊而斃之有愛姬極專房因其夫人之誕日作珠翠衣以獻夫人拒而不納姬乃發怒悉焚之友謙忽聞其臭詢之得實至暮遂命其姬三杯後責之喝起而毬杖已破腦矣洛陽鄭生丞相揚武之後也家藏法書數十軸賈君常得遍閲其尤異者晉衛瓘上晉武帝啓事紙尾有批答處又有太宗在遼東與宫人手敕言軍國事一取皇太子處置其翰真草相半字有不用者皆濃墨塗殺圓如棊子不可尋認復有歐陽率更為皇太子起草表本不書太子諱稱臣某叩頭頓首書甚端謹然多塗改於紙末别標臣詢呈本四字華嶽金天王廟明皇御製碑廣明中其石忽鳴隱隱然聲聞數里浹旬而後定明年巢冦犯闕其廟亦為賊火焚爇仍隳其門觀鄭縚先中者大中之外孫萬夀公主之子自襁褓至懸車事十一君凡七十載所任無官謗無私過三持使節不辱君命士無賢不肖皆恭己接納晚年傴時人咸曰鄭傴不名平生交友之中無怨隙親族之間無愛憎及致政歸洛燕居寢疾卒年八十位至戶部尚書江淮間多九郎廟與茅將軍廟九郎者俗云即苻堅之第九子曽有隂兵之感事極多説茅將軍者廟中多畫縛虎之像蓋唐末浙西僧德林少時遊舒州路左見一夫荷鋤治方丈之地左右數十里不見居人問之對曰頃時自舒之桐城至此暴得痁疾不能去因臥草中及稍醒已昏矣四望無人煙唯虎豹吼呌自分必死俄有一人部從如大將至此下馬據胡牀坐良久召二卒曰善守此人明日送至桐城縣下遂上馬忽不見唯二卒在焉某即強起問之答此茅將軍常夜出獵虎憂汝被傷故使護汝欲更問之則困臥及覺已日出不見二卒即起行意甚輕健至桐城頃之疾愈故以所見之地立祠祀之德林止舒州十年及回則村落皆立茅將軍祠矣胡桐淚出樓蘭國其樹為蟲所蝕沫下流出者名為胡桐淚言似眼淚也以汁塗眼今俗呼為胡桐律訛也無名異自南海來或云燒炭竈下炭精謂百木脂歸下成堅物也一云藥木膠所成然其功補損立驗胡人多將雞鴨打脛折將此藥摩酒沃之逡巡能行為驗形如玉栁石而黑輕為真或有橄欖作嘗之黏齒者偽也驗之真者取新生鹿子安此藥一粒於腹臍中其鹿立有肉角生是真也一云生東海者樹名多茄是樹之節膠採得胡人鍊作煎乾緣生異故有多説開元中重沙門一行幼時鄰母常濟行貧常思報之後王姥男殺人詣求救行曰要金帛可十倍酬國法難請姥戟手罵曰何用此為一行心計渾天日役數百工命空其室移一大甕於中又密遣奴二人持布囊曰汝可往某方某角有廢園汝潛伺之自午至昏當有異物至其數七可盡掩之失一則罪汝至彼酉時果有羣豕至奴獲七豕囊負歸令置甕中覆以木蓋封以六一泥朱書梵字數十其徒罔測詰旦中使詔對便殿玄皇曰太史奏昨夜北斗不見何祥也師禳之乎一行曰後魏時失熒惑至今帝車不見此天警陛下耳臣所見莫若大赦天下從之一行歸放一豕出其夕奏一星見至七夕皆見矣張志安居鄉閭稱孝差為里尹在縣忽稱母疾急白縣令令問之志安曰母有疾志安亦病志安適患心痛是以知母有疾令拘之差人覆之果如此説尋奏髙祖表門閭尋拜散騎常侍又裴敬彛父為陳王典所殺敬彛時在城忽自覺流涕不食謂人曰我大夫凡有痛劇吾即不安今日心痛手足皆廢事在不測遂歸覲父果已死懿宗賜公主出降幕三丈長一百尺輕亮向空張之紋如碧絲之貫赤珠雖暴雨不濡濕云以鮫人瑞香膏傅之故爾云得自鬼國狼之狀若蒼狗赤色者最猛每作聲竅皆沸腿中有筋大如雞子又筋滿身猶織絡之狀人或有犯盜諱不首者但燒此筋以煙薰之能使盜者手攣縮可怪凡邊疆放火號常用狼糞燒之以為煙煙氣直上雖烈風吹之不斜烽火常用此故謂候曰狼煙也龍之性粗猛而畏蠟愛玉及空青而嗜燒燕肉故食燕肉人不可渡海大中時女王國貢龍油絹形特異與常繒不類云以龍油浸絲織出雨不能濡又寶庫中有澄水帛亦外國貢以水蘸則寒氣蕭瑟暑月辟熱則一堂之寒思挾纊細布明薄可鑒云上傅龍涎故消暑毒也元和初隂陽家言五福太一在蜀故劉闢造五福樓符載為文記李鉉著李子正辨言至精之夢則夢中之身可見如劉幽求見妻夢中身也則知夢不可以一事推矣愚者少夢不獨至人聞之騶皂百夕無一夢也蜀東西川之人常互相輕薄西川人言梓州者乃我東門之草市也豈得與我耦哉節度使栁仲郢聞之謂幕賔曰吾立朝三十年清華備歷今日始得為西川作市令聞者皆笑之故世言東西兩川人多輕薄畿尉有六道入御史為天道入評事為仙道入京尉為人道入畿丞為苦海道入縣令為畜生道入判司馬為餓鬼道大中中丞郎宴席蔣伸在座忽酌一杯言曰座上有孝於家忠於國及名重於時者飲此爵衆皆肅然無敢舉者獨李孝公景讓起引此爵蔣曰此宜然劉禹錫言司徒杜公佑視穆贊也故人子弟佑見贊為臺丞數彈劾因事戒之曰僕有一言為大郎久計他日少樹敵為佳穆深納之由是稍霽其威太和中光祿厨欲宰牝牛牛有胎即日合生或曰既如此可換却屠者操刀直前略不介意牛乃屈膝拜之亦不肯退此牛并子遂殞於刃下而屠者忽狂惑失常每日作牛喘食草少許身入泥水以頭觸物良久方定杜荀鶴第十五字彥之池州人大順二年正月十日裴贄下第八人其年放榜日即荀鶴生日故王希羽贈詩云金榜曉懸生世日玉書潛紀上升時九華山色髙千尺未必髙於第八枝後入梁為主客員外郎翰林學士懷恩思報未幾暴卒李英公為宰相時有鄉人嘗過宅為設食客裂却餅緣英公曰君太少年此餅犁地兩遍熟槩下種鋤持收刈打揚訖磑羅作麵然後為餅少年裂却緣是何道理此處猶可若對至尊前公作如此事參差斫却你頭客大慙悚李齊物天寶初為陜州刺史開砥柱之險於石中得古鐵犁鏵有平陸字因改河北縣為平陸縣晉公在中書左右忽白以印失所在聞之者莫不失色度即命張筵舉樂人不曉其故竊怪之夜半宴酣左右復白以印存焉度不答極歡而罷或問度以其故度曰此出於胥徒盜印書券耳緩之則存急之則投水火不復更得之矣時人服其宏量胡楚賓屬文敏速每飲酒半酣而後操筆髙宗每令作文必以金杯盛酒令飲便以杯賜之李素替杜兼時韓吏部愈自河南令除職方員外郎歸朝問前後之政如何對曰將縑來比素李相國程執政時嚴謨嚴休皆在南省有萬年令闕人多屬之李云二嚴休不如謨元和十五年辛邱度邱紓杜元穎同時為遺補令史分直故事但舉其姓曰辛邱杜當入獨孤常州及末年尤嗜鼓琴得眼疾不理意欲專聽杜兼常聚書至萬卷卷後必自題云清俸寫來手自校汝曹讀之知聖道墜之鬻之為不孝大中三年東都進一僧年一百二十歲宣皇問服何藥而至此僧對曰臣少也賤素不知藥性本好茶至處唯茶是求或出亦日遇百餘碗如常日亦不下四五十碗因賜茶五十斤令居保壽寺開元以後鄙常侍拜此官者朝中謂之貂腳也杜邠公悰位極人臣富貴無比嘗與同列言平生不稱意有三其一為澧州刺史其二貶司農卿其三自西川移鎮廣陵舟次瞿唐為駭浪所驚左右呼喚不至渴甚自潑湯茶喫也天寶十三載始改金風調蘇莫遮為感皇恩中書門下戶部各有甲厯名為三庫以防渝濫戶部式云安曲西偏桃仁一石杭州糟藏越瓜二百挺瓜豆䜴五斗戎州荔枝煎五斗兼皮蜜浸四斗甘州冬奈五百顆房州竹𪕋五枚蘭州魁􅂒未詳兒六枚此每年進數余久主判戶部逐年所上貢此物咸絶但杭州進糟瓜爾姚峴為于頔陜州掾不勝其虐與其弟泛舟於河遂自投水而死光化四年正月宴於保寧殿上自製曲名曰讚成功時鹽州雄毅軍使孫德昭等殺劉季述帝反正乃製曲以褒之仍作樊噲排君難戲以樂焉孟雲之詩祖述沈千運景雲三年八月十七日東方有流星出五車至上台又歲星犯左執法時侍中竇懷貞請罷所職為安國寺奴罷職從之為寺奴不許章八元嘗於郵亭偶題數言蓋激楚之謂也會嚴維至驛問元曰汝能從我學詩乎曰能少頃遂發元已辭家維大異之乃親指喻數年間元擢第巨勝者玄秋之沈雲也茯苓者絳晨之伏胎也蘇渙本不平者善放白弩巴中號為弩跖賨人患之比壯年後自知非變節從學鄉舉擢第纍遷至侍御史佐湖南幕崔中丞遇害渙遂踰嶺扇動司空圖侍郎舊隱三峯天祐中移居中條山王官谷周回十餘里泉石之美冠於一山北巖之上有瀑泉流注谷中溉良田數十頃至今子孫猶存為司空之莊耳建中年中大林國貢火精劍其國有山方數百里上出神鐵以其有瘴毒不可輕採取若中國有聖君此鐵自流出鍊之為劍有光如電切金玉如泥以朽木磨之則生煙焰以金石擊之則火光迸溢德宗之將幸奉天自攜火精劍出於殿內遂以劍斫檻上鐵狻猊應手而碎及乘輿遇夜侍從皆見上仗之有數尺光明羅浮甘子其味逾常品開元中始有僧種之於南樓寺其後常資進獻幸蜀奉天之歲皆不結實婆娑石一名婆薩石靈臺記云星多者味甜無毒性溫療一切蟲毒及諸丹石毒腫毒䟜折此石出西蕃山澗中有盤形狀礧磈大小不常色如瓜皮青緑黑斑有星者為上似嵩山礬石斑不至煥爛者為中色如滑石微黃輕者為下但以人血拭之羊雞血磨一如乳似覺羶為妙西蕃以為防身之寶辟諸毒也封抱一任櫟陽尉有客過之既短又患眼及鼻塞抱一用千字文作語嘲之詩曰面作天地玄鼻有鴈門紫既無左達承何勞罔談彼崔郢為京尹日三司使在永達亭子宴丞郎崔乘酒突飲衆人皆延之時譙公夏侯孜為户部使問曰尹曽任給舍不崔曰無譙公曰若不曽任給舍京兆尹不合衝丞郎宴席命酒糾來罰下籌且喫罰爵取三大器引滿飲之良久方起決引馬軍將至斃崔出為賔客分司陸相扆出典夷陵時有士子修謁相國與之從容因酒酌勸此子辭曰天性不飲相國曰誠如所言已減過五分矣蓋平生悔吝各有十分不為酒困自然減半矣盧詹尚書任吏部押官告楷署其名字體遒麗時謂之真書盧家𡊮象先之子䉝初自大理評事除户部郎中未幾遷宣徽使不周載拜宣武軍節度使南部新書卷八
