body:
  text: 南部新書卷八宋錢易撰三銓之士具慶之下多避憂闕除則皆不受對易於他人大厯来自丞相以下出使作牧無錢起郎士元詩祖送者時論鄙之海内温湯甚衆有新豐驪山湯藍田石門湯岐州鳳泉湯同州北山湯河南陸渾湯汝州廣成湯兖州乾封湯邢州沙河湯此等諸湯皆知名之湯也並能愈疾驪山湯甫邇京邑帝王時所遊幸𤣥皇於驪山置華清宫毎年十月車駕自京而出至春乃還百官羽衞并諸方朝集商賈繁會里閭闐咽焉山上起朝元閣上常登眺命羣臣賦詩正字劉飛詩最清拔蒙賞之右相李林甫怒飛不先呈已出爲一尉竟不入而卒士子寃之喪亂以来湯所館殿鞠爲茂草博物志云水源有石硫黄其泉則温天下山泉由土石滋潤蓄而成泉耳如硫黄煎鑠久久理當焦竭有湯之處皆不出硫黄有硫黄之所不聞有湯事可明矣盧常侍鉟牧廬江日相座囑一曹生令署郡職不免奉之曹恱營妓名丹霞盧阻而不許會餞朝客於短亭曹獻詩云拜玉亭閒送客忙此時孤恨感離鄉尋思往歳絶纓事肯向朱門泣夜長盧演爲長句和而勗之曰桑扈交飛百舌忙祖亭聞樂倍思鄉樽前有恨慙卑宦席上無聊愛靚粧莫爲狂花迷眼界須求真理定心王遊蜂採掇何時已却恐多言議短長令丹霞改令罰曹霞乃遂别為一調以嘲曹因舉座歡笑而散有范師姨者知人休咎爲顔魯公妻黨顔嘗問之官階盡得五品否范笑曰鄰於一品顔郎所望何其卑也顔曰官階盡得五品身著緋衣帶銀魚兒子補齋郎余之滿望也范指座上紫絲食單曰顔郎衫色如是吳行魯尚書彭城人少年事内官西門思恭小心畏慎毎夜常爲温溺器以奉之深得中尉之意一日嘗爲中尉洗足中尉以足下文理示之曰如此文理争教不作軍容使行魯拜曰此亦無憑西門曰何也行魯曰若其然者某亦有之何爲常執僕厮之役乃脫履呈之西門嗟歎謂曰汝但忠孝我當爲汝成之後爲川帥元萬頃爲遼東道管記作檄文譏議髙麗曰不知守鴨緑之險莫離支報云謹聞命矣遂移兵守之萬頃坐是流於嶺南駙馬韋保衡之爲相以厚承恩澤大張權勢及敗長安市兒忽競彩戲謂之打圍不旬餘韋禍及吕衡州温祖延父渭俱有盛名重任而吕氏家風先世碑誌不假於人皆子孫自撰云欲傳慶善於信詞儆文學之荒墜也栁芳上元中爲史臣得罪竄逐黔中時髙力士亦徙巫州因相遇爲芳言禁中事芳因論次其事號曰問髙力士後著唐厯此書不復出開元皇帝初即位曽醉中殺一人自此覆杯四十年不嘗酒味真定帥王公一日攜諸子入趙州院師坐而問曰大王會麽王曰不會師云自小持齋身已老見人無力下禪牀王公尤加禮重翌日令客將傳語師下禪牀受之侍者問和尚見大王来不下禪牀今日軍將来爲甚麽却下禪牀師云非汝所知第一等人来禪牀上接中等人来下禪牀接末等人来三門外接端州以南三日一市謂之趂虚南中解毒藥謂之吉財俗云昔人遇毒其奴吉財得是藥與其主服遂解因名之又諺曰秋收稻夏收頭即婦人歳以截髮而貨以爲常也長沙岑和尚因問話蹋倒仰山仰山曰直下似箇大蟲自此諸方號爲岑大蟲長沙嗣南泉法名景岑也安邑縣北門縣人云有一蝎如琵琶大毎出来不毒人人由是無恐其靈積年也吕太一爲戸部員外郎戸部與吏部鄰司時吏部移牒令戸部於牆宇自𥪡棘以備銓院之交通太一答曰眷彼吏部銓總之司當須簡要清通何必樹籬種棘省中賞其清俊開元二十七年明州人陳藏器撰本草拾遺云人肉治羸疾自是閭閻相效割股於今尚之開元二十八年天下無事海内雄富行者雖適萬里不持寸刃不齎一錢開元二年以江寧縣置金陵郡天寶四載改尚書無頗字爲陂太平公主之出降薛紹也燎炬列焰槐樹多死永隆二年七月也上元二年制敕始用黄紙李客師爲大將軍即靖之弟也好從禽人謂之鳥賊貞觀末吐蕃獻金鵞可盛酒三斗景雲二年除賀拔嗣河西節度使節度使自此始楊妃本夀王妃開元十八年度爲道士入内裴子羽爲下邳令張晴爲縣丞二人俱有聲氣而善言語論事移時人吏竊相謂曰縣官甚不和長官稱雨賛府道晴終日如此非不和乎𤣥皇嘗召王元寶問其家財多少對曰臣請以絹一疋繫陛下南山樹樹盡臣絹未窮又𤣥皇御含元殿望南山見一白龍横亘山間問左右皆言不見令急召元寶問之元寶曰見一白物横在山頂不辨其狀左右貴臣啓曰何以臣等不見𤣥皇曰我聞至富可敵貴朕天下之貴元寶天下之富元寶又年老好戲謔出入市里人以爲錢文有元寶字因呼錢爲王老盛流於時矣河滿子者蜀中樂工將就刑獻此曲而不免當時云一聲去也又北史隋樂人王令言嘗臥於室内其子以琵琶於戸外彈作翻調安公子令言驚起問曰此曲有来逺近子曰頃来有之令言流涕曰帝往江東當不返矣子問之答曰此曲宫聲往而不反宫君也吾所以知之尋有江都之變江南無野狐江北無鷓鴣舊說也晉天福甲辰歳公安縣滄渚民家犬逐一婦人登木而墜爲犬嚙死乃老狐也尾長七八尺則丘首之妖江南不謂無也但稀有耳蜀中彭漢卭蜀絶無惟山郡往往而有里人號爲野犬更有黒腰尾長頭黒腰間燋黄或於村落鳴則有不祥事鶴瘡人血能療又說一世人則可惟洛中胡盧生爾鄭珏第十九應進士十九年及第十九人及第十九年後入相子遘太平興國中任正郎冀王朱友謙鎮河中常以一鐵毬杖晝夜爲從遇怒者擊而斃之有愛姬極專房因其夫人之誕日作珠翠衣以獻夫人拒而不納姬乃發怒悉焚之友謙忽聞其臭詢之得實至暮遂命其姬三杯後責之喝起而毬杖已破腦矣洛陽鄭生丞相揚武之後也家藏法書數十軸賈君常得遍閱其尤異者晉衞瓘上晉武帝啓事紙尾有批答處又有太宗在遼東與宫人手勅言軍國事一取皇太子處置其翰真草相半字有不用者皆濃墨塗殺圓如棊子不可尋認復有歐陽率更爲皇太子起草表本不書太子諱稱臣某叩頭頓首書甚端謹然多塗改於紙末别標臣詢呈本四字華嶽金天王廟明皇御製碑廣明中其石忽鳴隱隱然聲聞數里浹旬而後定明年巢冦犯闕其廟亦爲賊火焚爇仍隳其門觀鄭縚先中者大中之外孫萬夀公主之子自襁褓至懸車事十一君凡七十載所任無官謗無私過三持使節不辱君命士無賢不肖皆恭己接納晚年傴時人咸曰鄭傴不名平生交友之中無怨隙親族之間無愛憎及致政歸洛燕居寢疾卒年八十位至戸部尚書江淮間多九郎廟與茅將軍廟九郎者俗云即苻堅之第九子曽有隂兵之感事極多說茅將軍者廟中多畫縛虎之像蓋唐末浙西僧徳林少時遊舒州路左見一夫荷鋤治方丈之地左右數十里不見居人問之對曰頃時自舒之桐城至此暴得痁疾不能去因臥草中及稍醒已昏矣四望無人烟唯虎豹吼呌自分必死俄有一人部從如大將至此下馬據胡牀坐良久召二卒曰善守此人明日送至桐城縣下遂上馬忽不見唯二卒在焉某即强起問之答此茅將軍常夜出獵虎憂汝被傷故使䕶汝欲更問之則困臥及覺已日出不見二卒即起行意甚輕健至桐城頃之疾愈故以所見之地立祠祀之徳林止舒州十年及回則村落皆立茅將軍祠矣胡桐淚出樓蘭國其樹爲蟲所蝕沫下流出者名爲胡桐淚言似眼淚也以汁塗眼今俗呼爲胡桐律訛也無名異自南海来或云燒炭竈下炭精謂百木脂歸下成堅物也一云藥木膠所成然其功補損立驗胡人多將雞鴨打脛折將此藥摩酒沃之逡巡能行爲驗形如玉栁石而黒輕爲真或有橄㰖作嘗之黏齒者僞也驗之真者取新生鹿子安此藥一粒於腹臍中其鹿立有肉角生是真也一云生東海者樹名多茄是樹之節膠採得胡人鍊作煎乾緣生異故有多說開元中重沙門一行幼時鄰母常濟行貧常思報之後王姥男殺人詣求救行曰要金帛可十倍酬國法難請姥㦸手罵曰何用此爲一行心計渾天日役數百工命空其室移一大甕於中又宻遣奴二人持布囊曰汝可往某方某角有廢園汝潛伺之自午至昏當有異物至其數七可盡掩之失一則罪汝至彼酉時果有羣豕至奴獲七豕囊負歸令寘甕中覆以木蓋封以六一泥朱書梵字數十其徒罔測詰旦中使詔對便殿𤣥皇曰太史奏昨夜北斗不見何祥也師禳之乎一行曰後魏時失熒惑至今帝車不見此天警陛下耳臣所見莫若大赦天下從之一行歸放一豕出其夕奏一星見至七夕皆見矣張志安居鄉閭稱孝差爲里尹在縣忽稱母疾急白縣令令問之志安曰母有疾志安亦病志安適患心痛是以知母有疾令拘之差人覆之果如此說尋奏髙祖表門閭尋拜散騎常侍又裴敬彛父爲陳王典所殺敬彛時在城忽自覺流涕不食謂人曰我大夫凡有痛劇吾即不安今日心痛手足皆廢事在不測遂歸覲父果已死懿宗賜公主出降幕三丈長一百尺輕亮向空張之紋如碧絲之貫赤珠雖暴雨不濡濕云以鮫人瑞香膏傅之故爾云得自鬼國狼之狀若蒼狗赤色者最猛毎作聲竅皆沸腿中有筋大如雞子又筋滿身猶織絡之狀人或有犯盜諱不首者但燒此筋以烟薫之能使盜者手攣縮可怪凡邊疆放火號常用狼糞燒之以爲烟烟氣直上雖烈風吹之不斜烽火常用此故謂候曰狼烟也龍之性麤猛而畏蠟愛玉及空青而嗜燒鷰肉故食鷰肉人不可渡海大中時女王國貢龍油絹形特異與常繒不𩔖云以龍油浸絲織出雨不能濡又寶庫中有澄水帛亦外國貢以水蘸則寒氣蕭瑟暑月辟熱則一堂之寒思挾纊細布明薄可鑒云上傅龍涎故消暑毒也元和初隂陽家言五福太一在蜀故劉闢造五福樓符載爲文記李鉉著李子正辨言至精之夢則夢中之身可見如劉幽求見妻夢中身也則知夢不可以一事推矣愚者少夢不獨至人聞之騶皁百夕無一夢也蜀東西川之人常互相輕薄西川人言梓州者乃我東門之草市也豈得與我耦哉節度使栁仲郢聞之謂幕賔曰吾立朝三十年清華備歴今日始得爲西川作市令聞者皆笑之故世言東西兩川人多輕薄畿尉有六道入御史爲天道入評事爲仙道入京尉爲人道入畿丞爲苦海道入縣令爲畜生道入判司馬爲餓鬼道大中中丞郎宴席蔣伸在座忽酌一杯言曰座上有孝於家忠於國及名重於時者飲此爵衆皆肅然無敢舉者獨李孝公景讓起引此爵蔣曰此宜然劉禹錫言司徒杜公佑視穆贊也故人子弟佑見贊爲臺丞數彈劾因事戒之曰僕有一言爲大郎久計他日少樹敵爲佳穆深納之由是稍霽其威太和中光祿厨欲宰牝牛牛有胎即日合生或曰既如此可換却屠者操刀直前畧不介意牛乃屈膝拜之亦不肯退此牛并子遂殞於刃下而屠者忽狂惑失常毎日作牛喘食草少許身入泥水以頭觸物良久方定杜荀鶴第十五字彦之池州人大順二年正月十日裴贄下第八人其年放牓日即荀鶴生日故王希羽贈詩云金牓曉懸生世日玉書潛紀上昇時九華山色髙千尺未必髙於第八枝後入梁爲主客員外郎翰林學士懐恩思報未㡬暴卒李英公爲宰相時有鄉人嘗過宅爲設食客裂却餅緣英公曰君太少年此餅犁地兩遍熟槩下種鋤持收刈打颺訖磑羅作麵然後爲餅少年裂却緣是何道理此處猶可若對至尊前公作如此事參差斫却你頭客大慙悚李齊物天寶初爲陜州刺史開砥柱之險於石中得古鐵犁鏵有平陸字因改河北縣爲平陸縣晉公在中書左右忽白以印失所在聞之者莫不失色度即命張筵舉樂人不曉其故竊怪之夜半宴酣左右復白以印存焉度不答極歡而罷或問度以其故度曰此出於胥徒盜印書券耳緩之則存急之則投水火不復更得之矣時人服其宏量胡楚賓屬文敏速毎飲酒半酣而後操筆髙宗毎令作文必以金杯盛酒令飲便以杯賜之李素替杜兼時韓吏部愈自河南令除職方員外郎歸朝問前後之政如何對曰將縑来比素李相國程執政時嚴謩嚴休皆在南省有萬年令闕人多屬之李云二嚴休不如謩元和十五年辛邱度邱紓杜元穎同時爲遺補令史分直故事但舉其姓曰辛邱杜當入獨孤常州及末年尤嗜鼓琴得眼疾不理意欲專聽杜兼常聚書至萬卷卷後必自題云清俸冩来手自校汝曹讀之知聖道墜之鬻之爲不孝大中三年東都進一僧年一百二十歳宣皇問服何藥而至此僧對曰臣少也賤素不知藥性本好茶至處唯茶是求或出亦日遇百餘椀如常日亦不下四五十椀因賜茶五十斤令居保壽寺開元以後鄙常侍拜此官者朝中謂之貂脚也杜邠公悰位極人臣富貴無比嘗與同列言平生不稱意有三其一爲澧州刺史其二貶司農卿其三自西川移鎮廣陵舟次瞿唐爲駭浪所驚左右呼喚不至渴甚自潑湯茶喫也天寶十三載始改金風調蘇莫遮爲感皇恩中書門下戸部各有甲厯名爲三庫以防渝濫戸部式云安曲西偏桃仁一石杭州糟藏越瓜二百挺瓜豆䜴五斗戎州茘枝煎五斗兼皮蜜浸四斗甘州冬柰五百顆房州竹䶉五枚蘭州魁􅂒未詳兒六枚此每年進數余久主判戸部逐年所上貢此物咸絶但杭州進糟瓜爾姚峴爲于頔陜州掾不勝其虐與其弟汎舟於河遂自投水而死光化四年正月宴於保寧殿上自製曲名曰讚成功時鹽州雄毅軍使孫徳昭等殺劉季述帝反正乃製曲以褒之仍作樊噲排君難戲以樂焉孟雲之詩祖述沈千運景雲三年八月十七日東方有流星出五車至上台又歳星犯左執法時侍中竇懐貞請罷所職爲安國寺奴罷職從之爲寺奴不許章八元嘗於郵亭偶題數言蓋激楚之謂也㑹嚴維至驛問元曰汝能從我學詩乎曰能少頃遂發元已辭家維大異之乃親指喻數年間元擢第巨勝者𤣥秋之沈雲也茯苓者絳晨之伏胎也蘇渙本不平者善放白弩巴中號爲弩跖賨人患之比壯年後自知非變節從學鄉舉擢第累遷至侍御史佐湖南幕崔中丞遇害渙遂踰嶺扇動司空圖侍郎舊𨼆三峯天祐中移居中條山王官谷周迴十餘里泉石之美冠於一山北巖之上有瀑泉流注谷中溉良田數十頃至今子孫猶存爲司空之莊耳建中年中大林國貢火精劍其國有山方數百里上出神鐵以其有瘴毒不可輕採取若中國有聖君此鐵自流出鍊之爲劍有光如電切金玉如泥以朽木磨之則生烟焰以金石擊之則火光迸溢徳宗之將幸奉天自攜火精劍出於殿内遂以劍斫檻上鐵狻猊應手而碎及乗輿遇夜侍從皆見上仗之有數尺光明羅浮甘子其味逾常品開元中始有僧種之於南樓寺其後常資進獻幸蜀奉天之歳皆不結實婆娑石一名婆薩石靈臺記云星多者味甜無毒性温療一切蟲毒及諸丹石毒腫毒䟜折此石出西蕃山澗中有盤形狀礧磈大小不常色如𤓰皮青緑黒斑有星者爲上似嵩山礬石斑不至煥爛者爲中色如滑石微黄輕者爲下但以人血拭之羊雞血磨一如乳似覺羶爲妙西蕃以爲防身之寶辟諸毒也封抱一任櫟陽尉有客過之既短又患眼及鼻塞抱一用千字文作語嘲之詩曰面作天地𤣥鼻有鴈門紫既無左達承何勞罔談彼崔郢爲京尹日三司使在永達亭子宴丞郎崔乗酒突飲衆人皆延之時譙公夏侯孜爲户部使問曰尹曽任給舍不崔曰無譙公曰若不曽任給舎京兆尹不合衝丞郎宴席命酒糾来罰下籌且喫罰爵取三大器引滿飲之良久方起決引馬軍將至斃崔出爲賔客分司陸相扆出典夷陵時有士子修謁相國與之從容因酒酌勸此子辭曰天性不飲相國曰誠如所言已減過五分矣蓋平生悔吝各有十分不爲酒困自然減半矣盧詹尚書任吏部押官告楷署其名字體遒麗時謂之真書盧家𡊮象先之子䉝初自大理評事除户部郎中未㡬遷宣徽使不周載拜宣武軍節度使南部新書卷八
