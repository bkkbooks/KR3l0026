body:
  text: 南部新書卷九宋錢易撰李紋者早年受王涯恩及為歙州巡官時涯敗因私為詩以弔之末句云六合茫茫皆漢土此身無處哭田橫乃有人欲告之因而纂異記記中有噴玉泉幽魂一篇即甘露之四相也玉川先生盧同也同亦涯客性僻面黑常閉於一室中鑿壁穴以送食太和九年十一月二十日夜偶宿涯館明日左軍屠涯家族隨而遭戮裴說寬之姪孫佐西川韋臯幕善鼓琴時稱妙絶靈開山有美桐取而製以新樣遂謂之靈開琴蜀中又有馬給彈琴有名尤能大小間絃吳人陽子儒亦於悲風尤妙天尊應號者取靈寶經中三十二天之十方即其次序也大忌學士進名奉慰其日尚食供素膳賜茶十串大中年日本國王子求唐人圍棊上敕待詔顧師言敵著出楸玉局冷暖棊子本國有手談池池中出玉子不由製處自然黑白冬溫夏冷御府進饌凡器用有少府監進者九飣食以牙盤九枚裝食味其間置上前亦謂之看食見京都人說兩軍每行從進食及有宴設多食雞鵝每隻價直二三十千每有設據人數取鵝燖去毛及五臟餉以肉及粳米飯五味調和先取羊一口亦燖剝去腸胃置鵝於其中縫合炙之肉熟便揕去却羊取鵝渾食之謂之渾羊沒忽翰林學士每遇食賜食有物若畢羅形絶大滋味香美號為諸王修事髙劭者駢之猶子以門地遷華州刺史中和後寓圃田為蔡冦挈之後得脫去投汴梁祖擢為判官後駕在岐使致書四人至三原行十里遇害增佛壽命者續佛壽命也四分律中說住持毗尼藏者即住佛法也以住持佛法故乃續佛夀命結集緣起云佛臨涅槃阿難問佛佛滅度後以何為師佛答阿難吾滅度後以波羅提木叉為師梵曰波羅提木叉此云别解脫戒與毗尼同出而異名毗尼者此云調服律藏也又戒經序云今演毗尼法令正法久住太和九年敕江南湖南共以傔資一百二十分送上都充宰臣雇召手力宰臣李石堅讓乞只以金吾手力引從之時初誅李訓後也至今為例建中三年六月詔中書門下兩省各置印一面元和三年李藩為給事中時制敕有不可遂於黃紙批之吏曰宜連白紙藩曰别以白紙是文狀豈曰批敕裴垍言於上以為有宰相器俄而鄭絪罷免藩遂拜相萬回閿鄉人也神用若不足人謂愚癡無所能其兄戍安西久不得問雖父母亦謂其死矣日夕悲泣而憂思焉萬回顧父母感念其兄忽跪而言曰涕泣豈非憂兄耶父母且疑且信曰然萬回曰詳思我兄所要者衣裝糗糧屝屨之屬悉備之某將往觀之忽一朝齎所備而去夕返其家告父母白兄善矣發書視之乃兄跡也𢎞農抵安西蓋萬餘里以其萬里而回故曰萬回也萬回貌若愚癡忽有先舉異見驚人神異也上在藩邸時多行遊人間萬回每於聚落街衢中髙聲曰天子來或聖人來信宿間上必經過徘徊也安樂公主上之季妹也附㑹韋氏熱可炙手道路懼焉萬回望見車騎連唾曰血腥血腥不可近也不久而遂滅矣上知萬回非常人內出二宫人侍奉之時於集賢院圖形焉舊制碑碣之制五品以上碑七品以上碣若隱淪道素孝義著聞雖不仕亦立碣貞元以來選樂工三十餘人出入禁中號宣徽常入供奉皆假以官第每奏伎樂稱旨輒厚賜之至元和八年始分番上下更無他錫所借宅亦收之胡生者失其名以釘鉸為業居霅溪而近白蘋洲去厥居十餘步有古墳胡生若每茶飲必奠酹之嘗夢一人謂之曰吾姓栁平生善為詩而嗜茗及死葬室乃子今居之側常銜子之惠無以為報欲教子為詩胡生辭以不能栁强之曰但率子言之當有致矣既寤試搆思果有冥助者厥後遂工焉又一說列子終於鄭今墓在郊藪謂賢者之迹而或禁其樵採里有胡生性落魄家貧少為洗鏡鎪釘之業倐遇甘果名茶美醖輒祭於列禦冦之祠壟以求聰慧而思學道歷稔忽夢一人刀劃其腹開以一卷之書置於心腑及睡覺而吟詠之意皆甚美之詞所得不由於師友也既成卷軸尚不棄猥賤之業真𨼆者之風逺近號為胡釘鉸肅皇賜髙士𤣥真子張志和奴婢各一人𤣥真子配為夫妻名曰漁僮樵青人問其故答曰漁僮使卷釣收綸蘆中鼓枻樵青使蘇薪斫桂竹裏煎茶志和字子同太和中鄭汪中納山木如市一根有至萬錢者鄭覃力奏敕以禁絶開元十三年五月集賢學士徐堅等纂經史文章之要以類相從上制名曰初學記至是上之欲令皇太子及諸王檢事綴文爾開元中李紳為汴州節度使上言於本州置利潤樓店從之與下爭利非長人者所宜大厯八年吳明國進奉其國去東海數萬里經挹婁沃沮等國其土宜五穀多珍玉禮樂仁義無剽劫人壽二百歲俗尚神仙常望黃氣如車蓋知中國有土德君王遂貢常然鼎量容三斗光潔類玉其色純紫每修飲饌不熾火常然有頃自熟香潔異常久食之令人反老為少百疾不生禮記儒行云儒有席上之珍以待聘夙夜强學以待問注云席猶鋪陳也鋪陳往古堯舜之善道以待見問也大問曰聘今人使席上珍皆誤也皆以為樽俎之間珍羞耳潘嶽曰筆下摘藻席上敷珍亦誤也玉藻云笏天子以球玉諸侯以象士以魚須文竹注文猶飾也大夫士飾竹為笏不敢與君並用純物也釋文云用文竹及魚須也以魚須飾文竹之邊須音班今之人多呼魚須為鬚誤也余凡四為府監試官往往有舉子公然於無字韻內押雞樹郭頒晉魏世語曰劉放孫資共典樞要夏侯獻曹肇心內不平殿中有雞樹二人相謂此亦久矣其能復幾指謂中書令孫資中書監劉放今之人讚德於宰相多使雞樹非嘉也唐賢箋啓往往有之誤也大中二年以起居郎鄭皓尚萬夀公主詔曰女人之德雅合慎修嚴奉舅姑夙夜勤事此婦人之節也萬夀公主婦禮宜依士庶一行老病將死𤣥皇執手問之曰更有何事相敕行曰尚有二事其一曰勿遣邊人掌重兵不獲已用之勿與內宴若使見富貴必反逆以取其二曰禁兵勿付漢官須令內官監統及幸蜀臨渭水與肅皇别歎曰吾不用一行之言後方置神䇿軍又一說臨終留一物令弟子進上發之乃蜀當歸上初不喻及西幸方悟微㫖貞元中仕進道塞奏請難行東省數月閉門南臺惟一御史令狐楚為桂府白身判官七八年奏官不下由是兩河競辟才雋抱器之士往往歸之用為謀主日以恣橫元和以來始進用有序大足元年則天嘗引中書舍人陸餘慶入令草詔餘慶遲回至晚竟不能裁一詞由是轉左司郎中貞元初中書舍人五員俱缺在省惟髙參一人未幾亦以病免惟庫部郎中張濛獨知制誥宰相張延賞李泌纍以才可者上聞皆不許其月濛以姊喪給假或草詔宰相命他官為之中書省案牘不行十餘日華嶽雲臺觀中方之上有石崛起如半甕之狀名曰甕肚峯上嘗賞望嘉其髙迥欲於峯肚大鑿開元二字填以白石令百餘里望見諫官上言乃止武皇帝夢為虎所趂命京兆同華格虎以進至大中即屬虎開元末於𢎞農古函谷關得寶符白石赤文正成桑字識者解之云桑者四十八字也所以示聖上御厯數也及幸蜀之來歲四十八矣初得之時天下歌之遂改年天寶貞元中對延英李石奏曰臣往年從事西蜀中元日常詣佛寺見故劍南節度使韋臯圖形百姓至者先拜之而後謁佛偕歎有泣者臣貴異之訪於故老皆曰令公恩深於蜀人復問曰奚為恩深答曰百姓稅重令公輪年全放自令公後不復有此惠澤百姓困窮追思益切元和元年十二月李吉甫撰元和中國計簿十卷上之總計天下方鎮凡四十八道管州府二百九十五鎮縣一千四百五十三見定戶二百四十四萬二百五十五其鳳翔鄜坊邠寧振武涇原銀夏靈鹽河東易定魏鎮冀范陽滄州淮西淄青等一十五道合七十一州並不申戶口寶厯三年京兆府有姑鞭婦致死者請斷以償死刑部尚書栁公綽議曰尊毆卑非鬭也且其子在以妻而戮其母非教也遂減死紫宸舊例有接狀中郎取近御幄開成元年五月己酉其日直者老以傴文皇問李石曰此何人對曰郎白先朝上變色石奏曰姓白重名上先字下朝字及退遣閣門使問何時授此官曰今年正月石等謝曰中郎官國初猶用賢俊近日只授此輩因以郎官兼為之李寶符杜以白晳膺選開元令諸有猛獸之處聽作檻穽射窩等得即送官每一頭賞絹四匹捕殺豹及狼每一頭賞絹一匹若在監牧內獲者各加一匹其監牧內獲豹亦每一頭加賞絹一匹子各半之信乎長安上林近南山諸獸備矣令云諸度以北方秬黍中者一黍之廣分十分為寸十寸為尺一尺二寸為大尺一尺十尺為丈諸量以秬黍中者容一千二百黍為籥十籥為合十合為升十升為㪷三斗為大斗之一斗十㪷為斛諸權衡以秬黍中者百黍之重為銖二十四銖為兩三兩為大兩一兩十六兩為斤諸積秬黍為度量權者調鐘律測晷景合湯藥及冕服制度則用之此外官私悉用大者謂一尺二寸為一大尺三斗為一大斗三兩為一大兩在京諸司及諸州各給稱尺度㪷升合等樣皆以銅為之諸度地五尺為步三百步為一里章八元及第後居浙西恃才浮傲宴遊不恭韓晉公自席械繫之來晨將議刑時楊於陵乃韓女壻以同年救之曰為楊郎屈法楊元卿元和中自淮西背逆歸順闔門被屠其子延宗曽任磁州刺史開成中與河陽軍人謀逐帥以自立為其黨所告置於極典敕曰特寬今日覆族之刑以答當時毁家之效斃於枯木非謂無恩王源中字正蒙在內署嗜酒當召對沈醉不能起及醉醒同列告之源中但懷憂惕殊無悔恨他日又以醉不任赴召遂不得大用開成三年十一月薨於鄆州節度使又曽賜酒十金瓶酒飲皆盡瓶亦隨賜李珏在相因對明皇謂羣臣我自即位不曽枉誅一人不知任林甫破人家不少矣開成二年十二月癸卯詔曰應萬言童子等朝廷設科取士門目至多有官者令詣吏曹未仕者即歸禮部此外更或延引則為冗長自今更不得薦聞上元二年九月甲申天成地平節上於三殿置道場以內人為佛菩薩象寶裝飾之北門武士為金剛神王結綵被堅執鋭嚴侍於座隅焚香讚唄大臣近侍作禮圍繞設齊奏樂極歡而罷各賜帛有差栁公綽在山南有屬邑啓事者犯諱紏曹請罰公曰此乃官吏去就非公文科罰退其紏狀韓臯為京尹詔以宏詞拔萃所試就府考覆時論以升黜為當一日下朝有公主橫過騶道立馬杖肩輿人夫背各二十命捕賊吏引僦夫送公主歸宅主入訴遂貶杭州刺史開成中文皇一日謂執政曰丁居晦作中丞如何因悉數大臣而品第之歎曰宋申錫堪任此官惜哉又曰牛僧孺可為大夫鄭覃曰頃為中丞未嘗搏擊恐無風望上曰不然鸞鳳與鷹隼事異上又曰居晦作此官朕曽以時諺謂杜甫李白輩為四絶問居晦晦曰此非君上要知之事朕常以此記得居晦今所以擢為中丞肅皇元年吐蕃遣使入朝請和敕宰相於中書設宴將詣光宅寺為盟使者云蕃法盟誓取三牲血㰱之無向佛寺明日復於鴻臚寺㰱血栁公權嘗於佛寺看朱審畫山水手題壁詩曰朱審偏能貌夕嵐洞邊深墨寫秋潭與君一顧西牆畫從此看山不向南此句為衆歌詠後公權為李聽夏州掌記因奏事穆宗召對曰我於佛寺見卿筆札思見卿久矣宣出充侍書學士非時宰所樂進擬左金吾衛兵曹充職御筆改右小諫中外朝臣皆呼為國珍韓晉公在朝奉使入蜀至駱谷山椒巨樹聳茂可愛烏鳥之聲皆異下馬以柘弓射其巔杪柯墜於下響震山谷有金石之韻使還戒縣尹募樵夫伐之取其幹載以歸召良匠斫之亦不知其名堅緻如紫石有金色線交結其間匠曰為胡琴檀他木不可並遂為二琴名大者曰大忽雷小者曰小忽雷因便殿德皇言樂遂獻大忽雷為禁中所有小忽雷在親仁里開成三年十月甲午慶成節敕以酒脯并仙韶樂賜中書門下及文武百僚宴於曲江亭子蕭潮初至遂州造二幡施於寺設齊畢作樂忽暴雷霹竿成數十片矣至來歲當震日潮死荀諷者善藥性好讀道書能言名理樊曰光常給其絮帛有鐵鏡徑五寸鼻大如掌言於道者處得之無絶異但數人同照各自見其影不見他人太和六年承優入仕諸司流外令史掌因禮生批書醫工及諸軍使承優官典總一千九百七十二員至贊皇再入減得六百五十七員杜仲陽即杜秋也始為李錡侍人錡敗填宫亦進帛書後為漳王養母太和三年漳王黜放歸浙西續詔令觀院安置兼加存恤故杜牧有杜秋詩稱於世寶厯二年六月京兆府奏法曹參軍獨孤謂前件官元推問劫人賊車仲莒遂尋踪跡得去年十月於宣平坊北外門殺人并剝人面皮賊熊元果等三人兩人緣盜馬捉獲尋准法決殺訖伏以凶惡不去輦轂難為肅清勤勞不酬官吏無以激勸其獨孤謂伏請特賜章服尋依奏太和中水部員外郎杜涉常見江淮市人桃核扇量米正容一斗言於九疑山得之貞元初荆南有狂僧善歌河滿子嘗遇醉伍伯塗中辱令歌僧即發聲其詞皆陳伍伯平生過惡伍伯驚懼自悔之不暇王涯居相位有女適竇氏欲求錢十七萬市一玉叉涯曰於汝何惜此妖物也必與禍相隨後數月女自婚會歸告王曰前時玉叉在馮外郎妻首飾矣乃馮球也王歎曰馮為郎吏妻之首飾有十七萬錢其可久乎其善終乎馮為賈餗門人最密賈為東戶又取為屬郎賈有蒼頭頗張威福馮於賈忠將發之未能賈入相馮一日遇蒼頭於門召而勗之曰戶部中謗辭不一茍不悛必告相國奴拜謝而去未浹旬馮晨謁賈賈未興時方冬命火內有人曰官當出俄有二青衣出曰相公恐員外寒奉地黃酒三杯馮恱盡舉之青衣入馮出告其僕馭曰渴且咽粗能言其事食頃而終賈為興歎出涕竟不知其由明年王賈皆遘禍噫王以珍玩竒貨為物之妖信知言矣乃徒知物之妖而不知恩權隆赫之妖甚於物也馮以卑位貪貨已不能正其家盡忠所事而不能保其身斯亦不足言矣賈之臧獲害門客於牆廡之間而不知欲始終富貴其可得乎此雖一事作戒數端大中四年駙馬崔祀除大理少卿在司當職公式令諸文武官職事五品以上致仕身在京者每季令通事舍人一人巡問奏聞其在外州者亦令長吏季别巡問每年附朝集使聞奏使知安否宋守敬為吏清白謹慎纍遷臺省終於絳州刺史其任龍門丞年五十八數年而登列嶽每謂屬僚曰公輩但守清白何憂不遷俗之人每以雙陸無休勢余以為仕宦亦無休勢各宜勉之沙門𤣥奘俗姓陳偃師人少聰敏有操行貞觀三年因疾而挺志往五天竺國凡經十七歲至貞觀十九年二月十五日方到長安足所親踐者一百一十一國採求佛法咸䆒根源凡得經論六百五十七部佛舍利及佛像等甚多京師士女迎之填郛溢郭時太宗在東都乃留所得經像於𢎞福寺有瑞氣徘徊像上移晷乃滅遂詣駕并將異方竒物朝謁太宗謂之曰法師行後造𢎞福寺其處雖小禪院虛靜可為翻譯之所太宗御製聖教序髙宗時為太子又作述聖記並勒於碑麟德中終於坊郡王華寺𤣥奘撰西域記十二卷見行於代著作郎敬播為之序元和之初薛濤好製小詩惜其幅大不欲長賸乃狹小之蜀中才子既以為便後減諸箋亦如是特名曰薛濤箋韋綬自吏侍除宣察辟鄭處晦為察判作謝新火狀云節及桐葉恩頒銀燭綬削之曰此二句非不巧但非大臣所宜言晉書陶潛本傳云潛少懷髙尚博學善屬文嘗作五栁先生傳以自况先生不知何許人不詳姓字宅邊有五栁樹因以為號焉即非彭澤令時所栽人多於縣令事中使五栁誤也白氏六帖縣令門種五栁此亦誤也陜東道大行臺尚書令天䇿上將軍太皇在藩時為之及升儲並是省之諸道行臺武德九年並省貞觀元年改國子學為國子監分將作為少府監通將作為三監長安盛時哀家梨最為清珍諺謂愚者得哀家梨必蒸喫今咸陽出水蜜梨尤佳鄠杜間亦有之父老或謂是哀家種崔元綜則天朝為宰相得罪流南海之南會恩叙中尉引謝之日授分司御史纍遷中書侍郎時年九十九惟獨一身北省班諫議在給事中上中書舍人在給事下裴佶為諫議形質短小諸舍人戲之曰如此短小何得向上裴答曰若怪即曵向下著衆皆大笑後除舍人盧邁有寶琴各直數十萬有寒玉石磬響泉和志之號福州城中有烏石山山有峯大鑿三字曰薛老峯癸卯歲一夕風雨聞山上如數千人喧噪之聲及旦則薛老峯倒立三字反向上城中石碑皆自轉側其年閩亡智永禪師傳右軍父子筆法居長安西明寺從七十至八十十年寫真草千字文八百本每了人爭取之但是律召調陽即其真本也石本是內降貞觀年中也俗本稱律吕調陽誤也蓋以草聖召字似吕字耳以閏餘對律召是其義也徐散騎最博古亦誤為吕字杜佑自戶部侍郎判度支為盧杞所惡出為蘇刺時佑母在杞以憂闕授之佑不行換饒州大厯十一年制國子監置書學博士立說文石經字林之學舉其文義歲登下之亦古之學也武德末文皇欲平內難苑池內得白龜化為白石及登極後降制曰皇天眷祐錫以寶龜邢曹進至德中河朔將也飛矢中目而鏃留於骨三出之不得後遇神僧以寒食餳漬之出甚易月餘愈西明慈恩多名畫慈恩塔前壁有濕耳師子跌心花時所重也髙駢既好神仙性復多誕每稱與玉皇及羣仙書札來往時對賔客或書彩箋以為報答周寶在浙西副使崔綰公之妻族弟兄雁列於幕中觀察判官田佩亦其外甥二人最為貪暴其次陸諤以下皆挾勢而入及更變之後甚者亦多不免也時人多使沈碑峴首唐賢往往有之按晉書杜預好為身後名常言髙岸為谷深谷為陵刻石為二碑紀其勳績一沈方山之下一立峴山之上曰焉知此後不為陵谷乎沈碑峴首誤也當為沈碑方山鮑照字明逺至唐武后諱減為昭後來皆曰鮑昭惟李商𨼆詩云嫩割周顒韭肥烹鮑照葵又元稹詩云樂章輕鮑照碑版笑顔竣今人家有收得隋末唐初文選並鮑照爾𡊮州蔣勤處士作冷淘歌詞甚惡投郡守溫公受知語兒梨今俗說甚多皆不近理按萬歲厯云黃武六年正月獲彭綺是歲由拳西鄉有産兒墮地便語故名語兒鄉語兒梨者始出此鄉也今由拳屬杭州臨安出紙紙徑短色黃狀如牙版字誤可以舌䑛之不汙近亦絶有蓋取多工鮮而價卑也黃武吳年號六年丁未是魏明帝太和元年也今信州城西街連草市地名君遷仍多樹木人皆不辨余嘗通理是郡召父老詢之皆云不知其地名之由及披文選左太沖吳都賦云平仲君遷松梓古度楠榴之木相思之樹注曰皆木名以此詳之不辨之木乃君遷爾張去犀誼之子顯德年年十八著南征賦於淮南行在獻之召試除臺簿未幾因臺中議事不得預三院坐遂棄官歸圃田後狀元及第建隆二年也南部新書卷九
