body:
  text: 南部新書卷六宋錢易撰韋丹任洪州值毛鶴等叛造蒺藜棒一千具並於棒頭以鐵釘釘之如蝟毛車夫及防援官健各持一具其棒疾成易具用亦與刀劍不殊有洪州江西廉使問馬祖云弟子喫酒肉即是不喫即是師云若喫是中丞祿不喫是中丞福御史中丞長慶中行李車從不過半坊後逺至兩坊謂之籠街喝道及李虞仲與溫造相爭始敕下應喝道從官行李傳呼不得過三百步崔羣在翰苑為憲皇奬遇最深有宣云今後學士進狀並取崔羣連署方得進來武翊皇以三頭冠絶一代後惑婢薛荔苦其冢婦盧氏雖李紳以同年為護而衆論不容終至流竄解頭狀頭宏詞敕頭是謂三頭張不疑登科後江西李疑東川李回淮南李融交辟而不疑就淮南之命到府未幾卒卒時有怪在靈怪集裴紳始名誕日者告曰君名紳即伸矣果如其言蜀中傳張儀築成都城依龜行路築之李德裕鎮西川聞龜殼猶在軍資庫判官于文遇言比常在庫中元和初節度使髙崇文命工人截為腰帶胯具開元十九年冬駕東巡至陜以㕔為殿郭門皆屬城門局薛王車牛夜發及郭西門不開掌門者云鑰匙進內家僕不之信乃壞鎖徹關而入比明有司以聞上以金吾警夜不謹將軍假崇簡授代州督壞鎖奴杖殺之近俗以權臣所居坊呼之安邑李吉甫也靖安李宗閔也驛坊韋澳也樂和李景讓也靖恭修行二楊也皆倣此省中語曰後行祠屯不博中行都門中行刑戶不博前行駕庫西市胡人貴蚌珠而賤蛇珠蛇珠者蛇所吐爾惟胡人辨之薛偉化魚魂遊耳惟李徴化虎身為之吁可悲也婦女化蛇當亦有之王彥威鎮汴之二年夏旱時𡊮王傅李玘過汴因宴王以旱為言李醉曰可求蛇醫四頭十石甕二每甕以水浮二蛇醫覆以木蓋密泥之分置於閒處甕前設香席選小兒十歲以下十餘令執小青竹晝夜更互擊其甕不得少輟王如其言試之一日兩度雨大注數百里舊說龍與蛇醫為親家咸平中今祕書楊監億任正言知處州上祈雨法亦此類也石甕寺者在驪山半腹石甕谷中有泉激而似甕形因是名谷以谷名寺開元十四年御史大夫程行諶卒贈尚書右丞相時中書令張說新兼右丞相論者以為世傳此闕非穩故有斯贈以當之永貞二年三月彩虹入潤州大將張子良宅初入漿甕水盡入井飲之後子良擒李錡拜金吾尋歷方鎮伊闕縣前大溪每僚佐有入臺者即先漲小灘竒章公為尉忽報灘出邑宰列筵觀之老吏曰此必分司御史耳若是西臺當有鸂鶒雙立於上即是西臺牛公舉杯自祝俄有鸂鶒飛下不旬日有西臺之拜李德裕少時有人倫鑒者謂曰公主忌白馬凡親戚之間皆不畜之至崖州之命則白敏中在中書以公議排之馬植按淮南獄潘孟陽炎之子也其母劉夫人晏之女初為户部侍郎夫人憂曰以爾人材而在丞郎之位吾懼禍之必至也户部解喻再三乃曰不然試會爾列我觀之因遍招深熟者客至夫人視之喜曰皆爾儔也不足憂矣向末坐慘緑少年何人也曰𥙷闕杜黃裳夫人曰此人全别必是有名卿相中土人尚札翰多為院體者貞元年中翰林學士吳通微嘗工行草然體近吏故院中胥吏多所倣效其書大行於世故遺法迄今不泯其鄙拙則又甚矣李紓侍郎嘗放舉人命筆吏勒書紙榜未及名首書貢院字吏得疾暴卒禮部令史王昶者亦善書李侍郎召令終其事適值昶被酒已醉昏夜之中半酣揮染筆不加墨逮明懸榜方始覺悟修改不及粲然一榜之中字有兩體濃淡相間反致其妍自後書榜因模法之遂為故事今因用氊墨淡書亦竒麗耳福昌宫隋置開元末重修其中什物畢備駕幸供頓以百餘甕貯水駕將起所宿內人盡傾出水以空甕兩兩相比數人共推一甕初且搖之然後齊呼扣擊謂之鬭甕以為笑樂又宫人濃注口以口印幕竿上發後好事者乃斂脣正口印而取之開元初鹿苑寺僧法蘭者多言微㫖往往有效縣令劉昌源送客詣其房蘭曰長官留下腰帶麻鞋著未幾劉丁內艱太和中人指楊虞卿宅南亭子為行中書蓋朋黨聚議於此爾丞郎以上詞頭下至兩省闕下吏謂之大除改今南人之諺謂小末之事曰你大除改也程執恭在易定野中蟻樓髙三尺餘長安市里風俗每至元日以後遞飲食相邀號為傳座李詹大中七年崔瑶下進士與狄慎思皆好為酷以灰水飲驢蕩其腸胃然後圍之以火翻以酒調五味飲之未幾與膳夫皆暴卒慎思亦然志間和尚館陶人早參臨濟晚住灌溪乾寧二年夏忽問侍者曰坐死者誰曰僧伽立死者誰曰僧會乃行七步垂手而逝後鄧𨼆峯倒立而化波斯舶船多養鴿鴿飛千里輒放一隻至家以為平安信劉軻為僧時因葬遺骸乃夢一書生來謝持三雞子勸食之軻嚼一而吞二者後乃精儒學策名任史官時韓愈欲為一文贊焉而會愈貶文乃不就孟寧長慶三年王起放及第至中書為時相所退其年太和公主和戎至會昌三年起至左揆再知貢寧以龍鍾就試而成名是年石雄入塞公主自西蕃還京咸通末鄭渾之為蘇州督郵談銖為鹺院官鍾輻為院巡俱廣文時湖州牧李超趙蒙相次俱狀元二郡境土相接時為語曰湖接兩頭蘇聨三尾國初進士尚質有餘而文不足至於名以定體若紀千劫仞支干尋常無求吳楚江潮閻梅之類頗肖俳優反謂其姓氏亦黑臂黑肩之餘近代則文有餘而質不足矣范陽盧氏自紹元元年癸亥至乾符二年乙未凡九十二年登進士者一百十六人而字皆連于子然世稱盧家不出座主惟景陵二年盧逸以考功員外郎知舉後莫有之韋保衡頗訝之咸通十三年韋在相時盧莊為閣長決付春闈莊七月卒及盧攜在中書深恥之廣明元年乃追陜州盧渥入典貢帖復經巢賊犯闕天子幸蜀昭度於蜀代之矣髙燕公在秦州岐陽節度使杜邠公遞囚於界燕公牒轉云當州縣名成紀郡列隴西是皇家得姓之邦非鳳翔流囚之所邠公移書謝之自是燕公聲價始振開元中有師夜光善視鬼惟不見張果蘇粹員外頗達禪理自號本禪和崔羣是貞元八年陸贄門生羣元和十年典貢放三十人而黜陸簡禮時羣夫人李氏謂之曰君子弟成長合置莊園乎對曰今年已置三十所矣夫人曰陸氏門生知禮部陸氏子無一得仕者是陸氏一莊荒矣羣無以對韓藩端公自宣幕退居鍾山因服附子硫黃過數九竅百毛穴皆出血惟存皮骨小斂莫及但以丘褥舉骨就棺而已吁可駭也僖皇朝左拾遺孟昭圖在蜀上疏極諫為田令孜所惡矯詔沈蜀江裴相徹有詩弔之曰一章何罪死何名投水惟君與屈平從此蜀江烟月夜杜鵑應作兩般聲貞元初度支使杜佑讓錢穀之務引李巽自代先是度支以制用惜費漸權百司之職廣署吏員繁而難理佑奏營繕歸之將作木炭歸之司農染練歸之少府綱條頗整公議多之襄陽龎藴居士將入滅州牧于公頔問疾次居士謂之曰但願空諸所有慎勿實諸所無好住世間皆如影響言訖枕公膝而化楊盈川顯慶五年待制𢎞文館時年方十一上元三年制舉始補校書郎尤最深於宣夜之學故作老人星賦尤佳會昌葬端陵蔡京自監察攝左拾遺行事京自云御史府有大夫中丞雜事者總臺綱也侍御史有殿中侍御史外彈四推太倉左藏庫左右巡皆負重事也况不常備有兼領者監察使有祠祭使館驛使與六察已八矣分務京都臺又常一二巡囚監決案覆四海九州之不法事皆監察况不常備亦有兼領事者故御史不聞攝他官攝他官自端陵始也崔佑甫相國天寶十五載任中書舍人時安祿山犯闕軍亂不顧家財惟負私廟神主奔遁皆事親之髙節也天寶末韋斌謫守蘄春時李泌以處士放逐於彼中夜同宴屢聞梟音韋流涕而歎泌曰此鳥之聲人以為惡以好音聽之則無足悲矣請飲酒不聞梟音者浮以大白坐客皆企其聲終夕不厭聖厯二年敕二十四司各置印貞觀中尚藥奏求杜若敕下度支有省郎以謝眺詩云芳洲採杜若乃委坊州貢之本州曹官判云坊州不出杜若應由讀謝眺詩誤郎官作如此判事豈不畏二十八宿笑人耶太宗聞之大笑改授雍州司法李適之入仕不歷丞簿便為别駕不歷兩畿官便為京兆尹不歷御史及丞便為大夫不歷兩省給舍便為宰相不歷刺史便為節度使然不得其死天寶七載以給事楊釗充九成宫使凡宫使自此始也五坊使者鵰鶻鷹鷂狗謂之五坊大厯十四年六月敕御史中丞董晉中書舍人薛播給事中劉乃宜充三司使仍取右金吾將軍㕔一所充使院并西朝堂置幕屋收詞訟至建中二年十一月停後不常置有大獄即命御史中丞刑部侍郎大理卿充謂之大三司使次又以刑部員外郎御史大理寺官為之以決疑獄謂之小三司使皆事畢日罷春明門外當路墓前有堠題云漢太子太傅蕭望之墓有達官見而怪之曰春明門題額趂方從加之字只如此堠幸直行書但止合題蕭望墓何必加之字魏伶為西市丞養一赤觜鳥每於人衆中乞錢人取一文而銜以送伶處日收數百時人號為魏丞鳥會昌末頗好神仙有道士趙歸真出入禁中自言數百歲上敬之如神與道士劉𤣥靜力排釋氏武宗既惑其說終行沙汰之事及宣宗即位流歸真於南海𤣥靜戮於市白傅大中末曽有諫官上疏請諡上曰何不取醉吟先生墓表看卒不賜諡從父弟敏中在相位奏立神道碑文即李義山之詞也李揆乾元中為禮部侍郎嘗一日堂前見一蝦蟇俯於地髙數尺以巨缶覆之明日啓之亡矣數日後入相也殷僧辨周僧達與牛相公同母異父兄弟也李太尉之在崖州也郡有北亭子謂之望闕亭太尉每登臨未嘗不北睇悲咽有詩曰獨上江亭望帝京鳥飛猶是半年程青山也恐人歸去百匝千回繞郡城今傳太尉崖州之詩皆仇家所作只此一首親作也昔崖州今瓊州是也武德中天下始作秦王破陳樂曲以歌舞文皇之功業貞觀初文皇重製破陳樂圖詔魏徴虞世南等為詞因名七德舞自龍翔以後詔郊廟享宴皆先奏之大中四年冬令狐綯自戶部侍郎加兵部入相宰執同列白敏中崔龜從鉉以綯新加兵部至其月十八日南省上事故事送上必先集少府監是日諸相以敏中龜從曽為太常博士遂改集賢院因命栁公權記之龜從為詞杜琮目為秃角犀琮凡蒞藩鎮不省刑獄在西川日以推囚案牘不斷而將裹漆器歸京人於劍門拾得弄參軍者天寶末蕃將阿布思伏法其妻配掖庭善為優因隸樂工遂令為此戲元魯山山居阻水食絶而終稷山驛吏王全作吏五十六年人稱有道術往來多贈篇什故李義山贈詩云過客不勞詢甲子惟書亥字與時人鄭皓嘗夢中得句云石門霧露白玉殿莓苔青續成長韻此一聨杜甫集中詩羅隱羅鄴羅虬共在場屋謂之三羅韓建在華下成汭在荆門舊姓郭皆有理聲朝廷謂之北韓南郭杜邠公飲食洪博既飽即寢人有諫非攝生之理公曰君不見布袋盛米放倒即慢道吾和尚上堂戴蓮花笠披襴執簡擊鼓吹笛口稱魯三郎永寧李相蔚在淮海暇日攜酒樂訪節判韋公昭度公不在及奔歸未中途已聞相國舉酒縱樂公曰是無我也乃回騎出館相國命從事連往留截仍移席於㦸門以候及回相國舞楊栁枝引公入以代負荆太和七年八月敕每年試帖經官以國子監學官充禮部不得别更奏請其𢎞文崇文兩館生齊郎並依令式試經畢仍差都省郎官兩人覆試驪山華清宫毁廢已久今所存者惟繚垣耳天寶所植松柏遍滿巖谷望之鬱然雖屢經兵冦而不被斫伐朝元閣在山嶺之上基最為斬絶柱礎尚有存者山腹即長生殿殿東西盤石道自山麓而上道則有飲酒亭子明皇吹笛樓宫人走馬樓故基猶存繚垣之內湯泉凡八九所是御湯周環數丈悉砌以白石瑩徹如玉石面皆𨼆起魚龍花鳥之狀於名萬品不可殫記四面石座皆級而上中有雙白石甕腹異口甕中涌出濆注白蓮之上御湯西北角則妃子湯面稍狹湯側紅白石盆四所刻作菡萏之狀陷於白石面餘湯邐迤相屬而下鑿石作暗渠走水西北數十步復立一石表水自石表湧出灌注一石盆中此亦後置也魏徴疾亟文皇夢與徴别既寤流涕是夕徴卒故御製碑文云昔殷宗得良弼於夢中朕今失賢臣於覺後沙州城內廢大乘寺塔者周朝古寺見有塔基相傳云是阿育王本塔才有灾禍多來求救又洛都塔者在城西一里故白馬寺南一里許古基俗傳為阿育王舍利塔即迦葉摩騰所將來者永徽之理有貞觀之遺風製一戎衣大定樂曲至永隆元年太常丞李嗣真善審音律能知興衰云近者樂府有堂堂之曲再言之者唐祚再興之兆也後霓裳羽衣之曲起於開元盛於天寶之間此時始廢泗濵磬用華原石代之至天寶十三載始詔遣調法曲與胡部雜聲識者深異之明年果有祿山之亂益州福感寺塔者在州郭下城西本名大石相傳云是鬼神奉阿育王教西山取大石為塔基舍利在其中故名大石也隋蜀王秀作鎮井絡聞之令人掘鑿全是一石尋縫至泉不見其際風雨暴至人有於旁鑿取一片將去乃是醫玉問於識寶商者云此真醫玉世中稀有隋初有詵律師見此古跡於上起九級木浮圖貞觀初年地內大震動此塔搖揚將欲摧倒於時郭下無數人來忽見四神形如塔量各以背抵塔之四面乍倚乍傾卒以免壞平時開逺門外立堠云西去安西九千九百里以示戎人不為萬里之行天寶末康居國獻胡旋女蓋左旋右轉之舞也雲南有萬人冢者鮮于仲通李􅀢等覆軍之地長安夏中或天牛蟲出籬壁間必雨天牛蟲即黑甲蟲也段成式七度驗之皆應開元初突厥寇邊時天武軍將子郝靈筌出使回引回紇部落斬突厥黠夷獻首於闕下自謂有不世之功時宋璟為相以天子少好武恐徼功者生心痛抑其賞逾年始授中郎將靈筌遂嘔血而死釋提桓因者忍利天王之號也即帝釋二字華梵雙彰帝是華言即王主義釋乃梵字此字譯云能今言釋提桓因者梵呼訛略具正合云釋迦婆因達羅此云能天主餘如智度論釋南部新書卷六
