body:
  text: 南部新書卷十宋錢易撰彭蟾宜春人也著鳳池本草廟堂亟鏡一百二十卷廣明亂後遺墜髙駢在淮南有贄歌者末章云五色真龍上漢時願把霓旌引烟䇿公說乃辟爲從事及公遇害有識者多嗤其言過也貞元末許孟容為給事中權文公任春官時稱權許進士可不二公未嘗不相聞襄沔記云盧有踈水注於沔此水中有物如三四歳小兒膝頭如虎掌爪常沒水中出膝頭示人小兒不知欲弄之輒便啖人或有生得者摘其鼻可小便之名曰水虎也濮州刺史曹朔於汴水岸掘得鄂公馬鞭表進之不朽皮日休歴太常博士後從巢冦遇禍子光業為吳越丞相子文璨任元帥判官入京爲太僕少卿卒子子猷猷子仲卿祥符八年御前進士滑州有僧景陽碣在開元寺其僧不知何許人刺史令狐公以僧有戒行以紅米飯魚鱠施之令僧食其鱠盡化爲乳頭香食訖遣人隨之吐於河内化為活魚踴躍跳出後遷化大中十二年二月刺史李福置李綰咸通中作越察於甲仗庫剏樓名曰武威刻石立文自序樓文銘云名樓以武威兼義也余之望又出武威荆南舊有五花館待賓之上地也故蔣肱上成汭詩云不是上台名姓字五花賓館敢從容大中九月十七日勅徐泗節度使康季榮奏據濠州刺史劉彦謀狀定逺縣百姓周裕女小兒年九歳今年七月六日爲父患割左股上肉一寸三分不落瘡長一寸四分收得血半斤父和羮喫後二十九日載割股上已落肉與父喫其周裕至閏七月十二日身死至二十五日埋葬訖其女小兒於墓側不歸縣司與立草庵一所伏以寄分廉察地列山河獲當盛明親逢大孝伏請宣付史館并賜旌表門閭奉勅周小兒方在髫年允兹志行俾之旌表用激時風宜依所奏仍委本道量事優䘏杜悰鄭顥于悰皆是二月一日生悉尚主斛律金不解書有人教押名云但如立屋四面平正即得安祿山押字以手指三撮而成蜀葵㸃作火把猛雨中不滅蠟燭過頭把猛風中不滅建中元年貶御史中丞元全柔二年貶中丞楊瑱皆四月晦日憲皇擒劉闢李錡吳元濟行刑皆十一月朔日韋路作相貶不附己者十司戸崔沆循州李瀆繡州蕭遘播州髙湘髙州崔彦融恩州韋顔䖍州張瀆勤州杜裔休端州鄭彦持義州李藻􅀢州惟恩州不回韋執誼敗八司馬韋執誼崖州韓泰䖍州陳諫台州栁宗元栁州劉禹錫播州韓曄饒州凌凖連州程异郴州鄭珣瑜爲河南尹送迎中使皆有常處人吏窺之馬足差跌不出三五步韋保衡路巖作相勢動天地附其勢者有牛頭阿旁夜叉捷疾之號二相敗以累譴者數十人長安大内有口味庫乾符六年回祿爲災自後不置也唐末浙西鶴林寺三檜院五花亭勝槩也太和中入閤閤内都官班中有擡眼竊窺上者覺之班退語宰相曰適省郎班内第㡬人忽擡眼抹朕何也時裴晉公對曰省郎庶僚極卑微不合擡眼抹陛下上曰如何晉公曰即與打下著上曰此小事不用打下江西客司韓注多不禮客後進士唐珪謁蘇使君閽人不通刺因上詩曰江西昔日推韓注𡊮水今朝數趙祥縱使文翁能待客終栽桃李不成行裴相休留心釋氏精於禪律禪律師圭峯宻禪得達摩頓門宻師注法界觀禪詮皆相國撰序常披毳衲持鉢乞食於妓院自言曰不爲俗情所染可以說法爲人毎發願曰乞世世爲王来䕶佛法後于闐國王生一子手文間有裴字聞於中朝開元宫掖競食黄魚故於河陽作池養之謂之黄魚池盧氏說有官人衣緋於中書門祇候見宰相求官人問前任答曰某屬教坊作西方師子脚来三十年貞元十三年深州奏博野縣女子姓李氏號妙法年六十六廬墓經三十七年初李少年遇安祿山逆亂被虜刼他鄉聞父亡欲奔喪又以有一子不忍分離遂割一乳留别孩子而奔喪既而號慟擗踊遂燒一指以啓告先靈又以不見靈柩志欲廬墓兄弟不許遂以刀刺心見其志竟開埏道見棺櫬塵土以舌䑛之又以髮拭棺上塵埃自是廬舍墓側往往有異鳥翔集其墳上先無樹木李氏手自栽植雜樹一千根並髙數尺初廬墓數年又遇母疾漸至危亟李氏毎見母飲即飲母食或嘔涎唾並皆嘗之無㡬亡李氏自刺血母臂上以爲記其至性如此其年又廬州巢縣百姓張進昭母先患創左手落經一十三年乃亡殯後進昭自截左腕廬於墓側十宅諸王多解音聲倡優百戲皆有之以備上幸其院迎駕作樂禁中呼爲樂音郎君歸少師崇制宅子弟極多大都不喜肥者或有之則庭立之送歸藍田供笋蕨體減方還多時則妳監泣告俾歸澣濯宣皇於内中置杖内官有過多杖之延英對宰臣諫之上曰此朕家臣杖之何妨如卿等奴僕有過不可不決大中酷好科名帝於内中題鄉貢進士李道龍内官近多知書自文宣二帝李朱崖武皇朝為相勢傾朝野及得罪譴斥有人作詩云蒿􅁄春深衞國門九年於此盜乾坤兩行宻疏傾天下一夜隂謀達至尊肉視具僚忘匕箸氣吞同列削寒温當時誰是承恩者肯有餘波達鬼村又一首云氣勢凌雲威觸天權傾諸夏力排山三年驥尾有人附一日龍髯無路攀畫閣不開梁燕去朱門罷埽乳鵶還千巖萬壑應惆悵流水斜陽出武關此温飛卿詩也歸登書徑山碑是崔元翰文惟稱此龜字髙祖朝嚴甘羅武功人行刼爲吏所拘上謂曰汝何爲作賊甘羅對曰飢寒交切所以爲盜上曰吾爲汝君使汝窮乏吾之罪也赦之鄭仁表肅之次子仁規之弟恃才傲物士人薄之自謂門第人物文章具美常曰天瑞有五色雲人瑞有鄭仁表僖皇即位蕭倣崔彦昭秉政素惡劉鄴乃罷鄴知政事出爲淮南節度使是日鄴押班宣麻通事引鄴内殿謝不及笏記鄴自叙十餘句語曰霖雨無功深愧代天之用烟霄失路未知歸骨之期帝爲之惻然鄴三復之子贊皇門人也岐王薨册讓皇帝凡壙内置千味食監䕶使裴耀卿奏曰尚食所料水陸等味一千餘種毎色瓶盛安於藏内皆是非時瓜果及馬牛驢犢麞鹿肉并諸藥酒三十餘色儀注禮儀並無所憑遂減省之張循憲為侍御史長安中爲河東採訪使薦蒲州人張嘉貞材堪憲官請以己官秩授之則天召見垂簾與之語嘉貞奏曰以臣草莱得入謁九重是千載一遇也咫尺之間如隔雲霧竟不覩日月恐君臣之道有所未盡則天遽令卷簾與語大恱擢拜監察御史郭太后貴極終八朝代之外孫徳之外甥順之親婦憲之皇后穆之母敬文武三帝祖母建中口戴竿三原婦人王大娘首戴二十八人而走大厯年中河南尹相里造刹洛陽尉苗登有尾長二尺餘賈耽爲滑州節度使酸棗縣有一下里婦事姑不敬姑年甚老無目晨飱婦以餅裹犬糞授姑姑食覺異留之其子出還姑問其子此何物嚮者婦與吾食其子仰天大哭有頃雷震發若有人截婦人首以犬首續之耽令牽行於境内以戒不孝者時人謂之犬頭婦李祐爲淮西將元和十二年送款歸國裴令公破元濟入城官軍有剥婦人衣至裸體者祐婦姜氏懐姙五月爲亂卒所刼以刀劃其腹姜氏氣絶踣地祐歸見之腹開尺餘因脫衣襦裹婦一夕復蘇傅以神藥滿十月生一男朝廷以祐歸國功授一子官字曰行修年三十餘爲南海節度罷歸卒于道河東裴章者其父胄嘗鎮荆門州僧曇照道行甚髙能知休咎章幼時爲照所重言其官班位望過於其父章弱冠父爲娶李氏女及四十餘章從職太原棄妻於洛中過門不入别有所牽李氏自憾其薄常褐衣髽髻讀佛書蔬食又十年嚴綬尚書自荆州移鎮太原曇照隨之章因見照叙舊久之謂曰貧道五十年前言郎君必貴今則皆不何也章自以薄妻之事啓之照曰夫人生魂訴於上帝以非命處君後旬日爲其下以刃劃腹於浴器中五臟墮傷風遂死王縉爲相爲妾造寶應寺宏麗無比爲識者所嗤鄭覃歴官三十餘任未嘗出都門便登相位以至於終貞元初丹陽令王瓊三年調集遭黜落瓊甚惋憤乃賫百金詣茅山道士葉虚中求奏章以問吉凶虚中年九十餘强爲奏之其章隨香烟上天縹渺不見食頃復墮地有朱書批其末云受金百兩折禄三年枉殺二人死後處分後一歳無疾而卒太宗文皇帝虬鬚上可掛一弓唐李佐山東名族年少時因安史亂失其父後擢第有令名爲京兆少尹隂求其父有識告佐往迎於殯葬徒中歸而跪食如是累月一旦召佐曰女孝行純篤然吾三十年在此黨中昨從女歸未與流輩訣絶女可具大猪五頭白醪數斛蒜虀數甕薄餅十盤開設中堂吾與羣黨一醉申訣無恨矣佐承教數日乃具父出召客俄而市善薤歌者百人至初則列堂中久乃雜謳及暮皆醉衆扶佐父登榻而薤露一聲凡百皆和俄相扶坌出不知所往行路觀者億萬明日佐棄家入山數日而卒唐韓幹善畫馬閒居之際忽有一人朱衣𤣥冠而至幹問曰何得及此對曰我鬼使也聞君善圖良馬願賜一匹立畫焚之數日出有人揖而謝曰蒙惠駿足免爲山川跋涉之苦亦有以酬效明日有人送素縑百疋不知其来幹取用之河間王孝恭才知識畧特出於衆初受詔征輔公祏座上有水一器倐然變成血滿坐驚畏左右不測孝恭曰自無負神明此變應是公祏授首之兆座客始安至淮南乃梟公祏以獻時人服其先見明皇御勤政樓下設百戲坐安祿山於東間觀看肅宗諫曰歴觀今古無臣下與君上同坐閱戲者𤣥宗曰渠有竒相我有以禳之故耳又嘗與之夜讌祿山醉臥化爲一猪而龍頭左右遽告帝曰渠猪龍不能為也終不殺之卒亂中原元德秀貧時其兄早亡有遺孤期月其嫂又喪無乳哺之德秀晝夜哀號抱其子即以己乳含之涉旬而有潼遂長大德秀官魯山令有清政化惠於一邑闔境歌之盧羣居鄭之莆田讀書業成東遊淮海求索得千縑西之長安聞桑道茂善相術車馬闐門羣傾囊奉之桑生曰吾嘗以善惡鑒於時士所惠者涓埃而已今貺余益多其㫖何哉羣答曰少爲業已就西来求官以天下之人信先生之口將求一言得乎桑生曰有何不可曰乞自三事以下造問公者惟言近有一盧羣自東来十年持世間重柄貴不可及即是配分於是桑生昌言於時賢及旬辰之内凡京國重位名士皆造羣門同力申薦代宗聞其名召見即拜拾遺累官至鄭滑節度文皇謂虞世南一人而有五絶一曰博聞二曰德行三曰書翰四曰辭藻五曰忠直圖形凌烟閣年八十一終清泰朝李專美除北院甚有舟檝之歎時韓昭裔已登庸因賜之詩曰昭裔登庸汝未登鳳池雞樹冷如冰何如且作宣徽使免被人呼粥飯僧長興四年李遇奏尹拙自著作佐郎除左拾遺直史館諫官直館自拙始也爾後畿赤尉稍不登矣王居敏爲秦王六軍判官素不協意及從䇿擁兵之際與髙輦並轡指日影曰明日如今已誅王詹事矣史洪肇嘗與大臣飲於竇貞固之第以夙憤激蘇逢吉舉爵曰安朝廷定禍亂直須長鎗大劍至如毛錐子安足用焉三司使王章曰雖有長鎗大劍若無毛錐子占軍財賦自何而集肇黙然而散自此蘇史有隙陽邠起於小吏及爲相常言曰爲國家者但得帑藏豐盈甲兵强盛至於文章禮樂並是虚事何足介意自此後始不在清議王師範非名族世承姑息及其死也而無嗣輒有長幼之序三川之士多焉漢隱帝賜諸伶錦袍玉帶史洪肇奪之還官曰健兒戍邊寒暑未有優䘏爾輩不當也其凶戾也如此然至理得中後唐晉王嘉明宗之功以其屬五百騎號曰横衝都侍於帳下故兩河間目爲李横衝于鄴除工部郎中時尚書盧文紀諱業甚不平陶鑄欲請換曹其夕鄴雉經盧尚書貶石州司馬于盧之器固小也然過在執政趙光逢爲司徒致仕光裔入相有人省問其兄語及政事他日光逢署其户曰請不言中書事其端静也如此葛從周有殊功鎮青社人語曰山東一條葛無事莫撩撥楊尚書昭儉退居華下自題家園以見志曰池蓮憔悴無顔色園竹低垂減翠陰園竹池蓮莫惆悵相看恰似主人心近有鍾離令王仁岫善功算因集八卦五曹算法云用十二文牌子布位先須正坐其身以坐位便居北方也每牌子拘一位毎位從一至十起坎爲初巡指八方以方爲首八卦既畢却取其隂横九豎十積為前位常以九九正文顛倒呼命曕前顧後逐位取了須是明其九九正文進退精熟方可入於諸法次第加減一位因望折倍減五門不雜於五曹五曹秤尺地倉金五數悉通於一位或遇前後隔位即以辰次而空之或遇除減併繁别以閏牌而貼之總而存亡除留自然明其向背既轉移而得理則絲忽而無差但用諸法經門取其簡要若𩔖鼓珠之法且凝滯於乗除此法乃至開方立方求一立一皆可通其體例耳法眼姓魯雪峯姓曽或問雪峯師何姓也答曰魯人不繫腰却問法眼師何姓也答曰雪峯繫腰帶盧文進幽州人也至江南李氏封范陽王嘗云陷契丹中屢入絶塞正晝方獵忽天色晦黒衆星燦然問番人云所謂笪却日也以此爲常頃之乃明方午也又云嘗於無定河見人脛骨一條大如柱長可七尺後唐太祖嘗隨火征龎勛臨陣出沒如神號爲火龍子王審知起事其兄潮倡首及審知據閩中爲潮立廟水西故俗謂之水西大王梁祖初革唐命讌於内殿悉㑹戚屬又命葉子戲黄王忽不擲目梁祖曰朱三你受他許大官職久逺家族得安穏否於是擲戲具於階抵其盆而碎之劉坦狀元及第爲淮揚李重進書記好酒李常令酒庫但書記有客無多少供之尋爲掌庫吏頗恡之須索甚艱因大書一絶於㕔之屏上云金殿試迴新折桂將軍留辟向江城思量一醉猶難得辜負揚州管記名未㡬重進望日復謂于坦讀之忽悟曰小吏恡酒於書記也立命斬之坦不懌凡數月悔而成疾正衙宣樞宻使制自周祖始漢隱帝嗣位之初故也有米都知者伶人也善騷雅有道之士故西樞王公朴嘗愛其警䇿云小旗村店酒微雨野塘花梁補闕亦贈其詩云供奉三朝四十年聖時流落髮衰殘貪將樂府歌明代不把清吟換好官近有商訓者善吹笙亦籍教坊爲都知能别五音知吉凶復得畫之三昩山水不下關李王延彬獨據建州稱僞號一旦大設僞伶官作戲辭云只聞有泗州和尚不見有五縣天子馬全節鄴都留守以元城是桑梓之邑具白襕詣縣庭謁拜縣令沈遘避之節曰父母之鄉自合致恭勿讓也州里榮之孫光憲從事江陵日寄住蕃客穆思宻嘗遺水仙花數本摘之水器中經年不萎後唐莊宗年十一從晉王討王行瑜初令入覲獻捷昭宗一見駭異之曰此子有竒表乃撫其背曰兒將来國之梁棟勿忘忠孝於吾家乃賜鸂鶒酒巵翡翠盤十三讀春秋畧知大義騎射絶倫其心豁如採錄善言聽納容物殆劉聰之比也又昭宗曰此子可亞其父時人號曰李亞子楊暉内侍字道濟僖皇末權樞宻出爲浙西監軍朱梁簒後竄身投武肅居越中長八尺有黄白法善六壬課事饌至精四季皆榜厨手冩九經三史百家用蒲薄紙字如蠅頭年九十餘卒四明人胡抱章作擬白氏諷諫五十首亦行於東南然其辭甚平後孟蜀末楊士達亦撰五十篇頗諷時事士達子舉正端拱二年進士終職方員外郎長興元年二月郊祀敕内外羣臣職帶平章事兼侍中中書令與改里鄉名號僞蜀韓昭仕王氏爲禮部尚書麗文殿大學士粗有文章至於琴棊書算射法悉皆涉獵以此承恩於後主朝士李台瑕曰韓八座事藝如拆韈線無一條長時人韙之朱耶赤心者或云其先塞上人多以騎獵爲業邊人三十輩於大山中見飛鳥甚衆鴶䲳於一谷中衆人就之見一小兒約纔二歳已来衆鳥銜果實而飼之衆人異之遂收回衆遞養之成長求姓衆云諸人共育得大遂以諸耶爲姓言朱耶者訛也天成中帝謂侍臣曰自古鐵券其事如何趙鳳對曰此則帝王誓文賜其子子孫孫長享爵祿帝曰先朝所賜惟三人耳崇韜繼麟尋皆族滅朕之危疑事慮朝夕嗟歎久之趙鳳曰帝王所執故知不必銘金鏤石帝曰敢不深誡忠懿王在錢塘顯徳中有民沈超者負罪逃匿禁其母凡百日不出及追妻鞫之當日来首判之曰母禁十旬屢追不到妻縶半日不召自来倚門之義稍輕結髮之情太重領於市心軍令處分又大貂曹公鎮青海有盜魁累犯當死皆㑹赦至公在任又犯有司以赦文舉之公判曰三遇赦文天子之恩合免屢爲民患將軍之令必行乃從極典陶穀小名鐵牛李濤嘗有書與之曰毎至河源即思令德唐彦謙之孫也以石晉諱改姓焉南部新書卷十
