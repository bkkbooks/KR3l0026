body:
  text: 南部新書卷三宋錢易撰梁崇義長安市井人有力能卷金舒鈎後自羽林射生纍為襄陽節度使同平章事終以謀叛伏誅道州録事參軍王沼與楊炎有微恩及炎入相舉沼為監察御史始減公議舊令一品墳髙一丈八尺惟郭子儀薨特加千尺貞元以來禁中銀瓶不過髙五尺齊映在江西因降誕日獻髙八尺者士君子非之穆元休寧之父也撰洪範外傳十篇開元中授偃師丞朱泚亂臣之守節不為迫脅者程鎮之劉乃蔣沇趙驒薛岌于邵善知人樊澤舉制科至京一見之謂人曰將相之材也後五年而澤建節崔先翰赴舉年五十亦曰不十年當掌誥皆如其言其知人也如此西川浣花任國夫人即崔寧妻也廟今存王叔文始欲掃木場斬劉闢而韋執誼韙之蓋欲為臯求三川也崔造韓㑹盧東美張正則為友皆僑居上元好談經濟之略嘗以王佐自許時人號為四䕫李白為天才絶白居易為人才絶李賀為鬼才絶李令問開元中為殿中監事饌尤酷罌鵝籠驢皆有之令問世績之孫也咸通中楊汝士與諸子位皆至正卿所居靖恭里第兄弟並列門㦸天授中中丞李嗣真等為十道存撫使合朝有詩送之名曰存撫集凡十卷太宗破髙昌收馬乳蒲桃種於苑并得酒法仍自損益之造酒成緑色芳香酷烈味兼醍醐長安始識其味也有進士邱絳者嘗為田季安從事後與同府侯臧相持爭權季安怒斥絳攝下邑尉使人先路穴地以待至則排入而瘞之其暴如此李錡殺崔善貞亦同斯酷貞元中祈雨於興慶宫龍堂有白鸕鷀見池上衆鸕鷀羅列前後如引御舟翌日降雨永泰初乃詔左僕射裴冕等一十三人同於集賢院待制特給飱錢繕修廨宇以優其禮自後遷者非一隋制桐木巾子蓋取便於事武德初使用絲麻為之頭初上平小至則天時內宴賜羣臣髙頭巾子號為武家樣後裴冕自創巾子尤竒妙長安謂之僕射樣貞元十二年九月庚子賈耽私忌絶宰相班中使出召主書吳用承㫖時趙憬薨盧邁請假之故也淮南程幹本富家三年間為水火焚蕩家業俱盡妻茅氏連八年生十六男父子相攜行乞於市貞元七年令常參官每日二人引見延英訪以政事謂之巡對開元元年改諸王侍讀為奉諸王講李石上請也神龍初洛水漲宋務先上疏曰巷議街談共呼坊門謂宰相為節宣風雨燮調隂陽司馬天師承禎狀類隱居聖善寺報慈閣佛像自頂至頥八十三尺額中受八石新進士放榜後翼日排光範門候過宰相雖云排建福門集於四方館昔有詩云華陽觀裏鐘聲集建福門前鼓動期即其日也採訪使開元二十二年二月十九日宰相張九齡奏置時以御史中丞盧絢為之大厯十四年七月十日間廏奏准舊例每日於月華門立馬兩匹仗下後歸廏髙祖第三女平陽公主柴氏初舉義兵於司竹園號娘子軍即柴紹之妻也大中以來禮部放榜歲取三二人姓氏稀僻者謂之色目人亦謂曰榜花張嘉貞開元中任中書令著緋傅遊藝武后時居相位著緑僧惠範以罪沒入其錢得一千三百萬索元載家破納産胡椒九百石鄭注誅後納絹一百萬匹他物可知矣時政記宰臣所修起於長壽中宰相姚璹録中書門下事每歲十一月天下貢舉人於含元殿前引見四方館舍人當直者宣曰卿等學富雄詞逺隨鄉薦跋涉山川當甚勞苦有司至公必無遺逸仰各取有司處分再拜舞蹈訖退開元式諸蕃使嗣以元㑹日並聽升殿自外廊上長安中嘗見有人臘長尺許眉目手足悉具或以為焦僥人也清夜遊西園顧長康畫有梁朝諸王跋尾云圖上若干人並食天祿貞觀中禇河南裝背小說中言十家事起者即太和九年冬甘露事也凡滅十家咸通中俳優恃恩咸為都知一日樂工喧譁上召都知止之三十人並進上曰止召都知何為畢至梨園使奏曰三十人皆都知乃命李可及為都都知後王鐸為都都統襲此也吁哉故事三館學士不避行臺謂三院連鑣也凡進士入試遇題目有家諱謂之文字不便即托疾下將息狀出來牒云某忽患心痛請出試院將息謹牒如的暴疾亦如是兩省官上事日宰相臨送上事者設牀坐而判三道宰相别施一牀南坐四隅謂之壓角李珏為河南尹上事之日命工曹示之曰先拜恩後上事今禮上事之儀謝恩之後更拜㕔誤也裴度帶相印入蔡李訴具軍容度避之訴曰此方不識上下今具戎服拜相國於堂下使民吏生畏度然之自後帶宰相出鎮凡經州郡皆具櫜鞬迎於道左自此始也玉真公主玉葉冠時人莫計其價崔元翰晚年取應咸為首捷京兆解頭禮部狀頭宏辭敕頭制科三等敕頭裴次元制䇿宏辭同日敕下並為敕頭時人榮之李羣玉好吹笙常使家僮奏之又善急就章性善養白鵝及授校書郎東歸故盧肇送詩云妙吹應諧鳳工書定得鵝天寶中內種甘子結實凡一百五十顆至德三年始置鹽鐵使王綺首為也大厯八年虎入元載私廟麟德殿三面亦謂之三殿天寶十載寫一切道經五本賜諸觀武德四年廢五銖錢行開元通寶錢歐陽詢製文及書回環讀之其義皆通初進錢樣文德皇后掐一甲跡故錢背上有掐文李肇自尚書郎守澧陽人有藏書者卒歲玩焉因著經史目録天寶末管戶尚九百六萬九千一百五十四李善於梁宋之郊開文選學乃注為六十卷張昌齡與太皇作息兵甲詔歎曰禰衡潘嶽之儔也蕭倣為廣帥曽有疾召醫者視云藥用烏梅子欲用公署中者倣乃召有司以市價計而後取廉也如此光啓元年鎮州王鎔進耕牛一千頭戎器九千三百事表云庶資闢土之功聊備除凶之用舊制東川每歲進浸荔枝以銀瓶貯之蓋以鹽漬其新者今吳越間謂之鄞荔枝是也此乃閩福間進者自明之鄞縣來今謂之銀非也咸通七年以道路遙逺停進軒轅集謂之羅浮先生已數百歲而顔色不老立於牀上而垂髮至地天寶四載撰黃素文於內道場為民祈福其文自飛上天空中云聖壽延長武德故事御史臺門北開者法司主隂取冬殺之義或云隋初移都之時兵部尚書李圓通判御史大夫欲向省便故開北門大中十年春宣皇微行至新豐栁陌見一布衣抱膝而歎因問之布衣曰我卭人觀光至此此甚快樂有巢由之想又為橐裝所迫今崔相公鎮西川欲預其行無雙縑以遺其掌事者帝曰子明旦相伺於此及旦敕慎由將歸劍門張仲武㑹昌末鎮漁陽有政績後有年八九十人少識其面者說之猶淚下王龜起之子於永達坊選幽僻帶林泉之景曰半隱亭後太和初從起於蒲中修葺書堂以居之號曰郎君谷唐制員外郎一人判南曹在曹選街之南故曰南曹薛逢命一真士貌真自為贊曰壯哉薛逢長七尺五寸於是筆終未能續一旦忽有羽衣詣門延之與語忽於東壁見真讀贊乃命筆續之曰手把金鎚鑿開混沌長揖而退出門不知所去逢鑿混沌賦馳名天寶十載始封四海神為王安祿山肚垂過膝重三百五十斤妖人也大厯十三年改諸道上都留後為進奏狄梁公為兒童時與諸昆同遊於道遇善相者海濤法師驚曰此郎位極人臣蒼生是賴但恨衰朽之質所不見爾李六娘者蒲州人師事紫微女道士為童子開元二十三年十月二十三夜宴坐而睡覺已在河南府開元觀京兆尹李適之以為妖考之顔色不變具上聞召入內度為道士鄭餘慶廉儉一旦書請兩省家膳至則脫粟蒸葫蘆而已元和太和以來左右中尉或以幞頭紗贈清望者則明晨必有美丘之制陳萇者每候陽城請俸常往稱其錢帛之美月有獲焉歲三月望日宰相過東省看牡丹兩省官赴宴亦屈保傅屬卿而已盧懷慎暴卒而蘇曰冥司三十爐日夕為張說鼓鑄橫財我無一焉張建章四鎮之行軍司馬也曾齎戎命往渤海回及西崖經太宗征遼碑半在水中建章則以帛包麥屑置於水中摸而讀之不缺一字髙駢章疏不恭皆顧雲之辭也駢後謂左右曰異日朝廷以不臣見罪此輩寧無赤族之患耶李德裕三鎮遷改皆有異人為言之惟投南荒未嘗先覺李元賓言文貴天成强不髙也李翰又言文章當如千兵萬馬而無人聲李德裕鎮浙西劉三復在幕一旦令草謝御書表謂之曰立搆也歸創之三復曰文理貴中不貴其速贊皇以為當王起鴻博文皇嘗撰字試之起曰臣中國書中所不識者惟八駿圖中三五字而已倪曙有賦名為太學博士制詞螢雪服勤屬詞清妙因廣明庚子避亂番禺劉氏僭號為翰林學士董昌稱僭殺判官李韜施從實竇鄞皆强諫不聽韜最錚錚曽為兩淮鹽鐵及昌敗咸有封贈南部新書卷三
